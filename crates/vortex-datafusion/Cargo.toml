[package]
name = "vortex-datafusion"
authors = ["Vortex Authors <hello@vortex.dev>"]
categories = ["database-implementations", "data-structures", "compression"]
description = "Apache Datafusion integration for Vortex"
edition = "2024"
homepage = "https://github.com/spiraldb/vortex"
keywords = ["vortex"]
license = "Apache-2.0"
repository = "https://github.com/spiraldb/vortex"
rust-version = "1.89"
version = "0.54.0"

[dependencies]
arrow = { workspace = true }
arrow-schema = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
datafusion-catalog = { workspace = true }
datafusion-common = { workspace = true }
datafusion-common-runtime = { workspace = true }
datafusion-datasource = { workspace = true }
datafusion-execution = { workspace = true }
datafusion-expr = { workspace = true }
datafusion-physical-expr = { workspace = true }
datafusion-physical-expr-common = { workspace = true }
datafusion-physical-plan = { workspace = true }
datafusion-pruning = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
log = { version = "0.4.21" }
moka = { workspace = true, features = ["future"] }
object_store = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "fs"] }
tokio-stream = { workspace = true }
tracing = { workspace = true }
uuid = { version = "1.11", features = ["v7"] }
vortex = { workspace = true, features = ["object_store", "tokio"] }
vortex-utils = { workspace = true, features = ["dashmap"] }

[dev-dependencies]
anyhow = "1.0.95"
datafusion = { workspace = true }
insta = { workspace = true }
rstest = "0.26"
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util", "rt-multi-thread", "fs"] }
walkdir = "2.5.0"

