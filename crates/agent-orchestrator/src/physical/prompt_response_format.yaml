type: json_schema
json_schema:
  name: prompt_step
  schema:
    type: object
    properties:
      prompt:
        description: The text content of the prompt to provide to the model for a completion
        type: string
      model:
        description: The name of the model to target for the completion
        type: string
      success_criteria:
        description: At the completion of this step, what should be true? What is the measure of knowing the step is complete?
        type: string
    required:
      - prompt
      - model
      - success_criteria
    additionalProperties: false
strict: true