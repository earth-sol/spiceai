type: json_schema
json_schema:
  name: agentic_physical_planner
  schema:
    type: object
    properties:
      description:
        description: A description of the step to be taken
        type: string
      tool:
        description: The specific name of the tool to use
        type: string
      body:
        description: The parameters to call the tool with, provided as a JSON object. The body must conform to the schema of the tool being called.
        type: string
    required:
      - description
      - tool
      - body
    additionalProperties: false
strict: true