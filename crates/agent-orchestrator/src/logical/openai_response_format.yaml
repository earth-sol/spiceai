type: json_schema
json_schema:
  name: agentic_logical_planner
  schema:
    type: object
    properties:
      tasks:
        description: The list of stages involved in completing the task
        type: array
        items:
          type: object
          properties:
            objective:
              description: The objective of this stage, and what it should achieve
              type: string
            tags:
              description: Optional tags to categorize or label this stage
              type: array
              items:
                type: string
            steps:
              description: The list of steps involved in completing the task
              type: array
              items:
                type: object
                properties:
                  description:
                    description: A description of the step to be taken
                    type: string
                  tags:
                    description: Optional tags to categorize or label this step
                    type: array
                    items:
                      type: string
                  action:
                    description: The type of action to be taken
                    type: string
                    enum:
                      - change_directory
                      - create_directory
                      - read_object
                      - write_object
                      - execute_terminal
                      - other
                      - response
                      - request_for_info
                      - retrieve_metadata
                      - validation
                      - improvement
                  input:
                    description: |
                      The input to the action. This could be the content of a file to be written, or the
                      name of a file to be read.
                      For example, for a execute_terminal type, this would be the command to run.
                      For a change directory, the relative path of the directory to change to.
                    type: string
                  success_criteria:
                    description: At the completion of this step, what should be true? What is the measure of knowing the step is complete?
                    type: string
                required:
                  - description
                  - action
                  - input
                  - success_criteria
                additionalProperties: false
          required:
            - objective
            - steps
          additionalProperties: false
    required:
      - tasks
    additionalProperties: false
strict: true
