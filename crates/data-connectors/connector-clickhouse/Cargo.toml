[package]
name = "connector-clickhouse"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
license.workspace = true
description = "ClickHouse data connector for Spice.ai runtime"

[dependencies]
async-trait.workspace = true
clickhouse-rs.workspace = true
data_components = { path = "../../data_components", features = ["clickhouse"] }
datafusion.workspace = true
datafusion-table-providers.workspace = true
db_connection_pool = { path = "../../db_connection_pool", features = ["clickhouse"] }
linkme.workspace = true
ns_lookup = { path = "../../ns_lookup" }
paste.workspace = true
runtime = { path = "../../runtime" }
secrecy.workspace = true
snafu.workspace = true
url.workspace = true

[features]
default = []
