[package]
edition.workspace = true
exclude.workspace = true
homepage.workspace = true
license.workspace = true
name = "runtime-object-store"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
async-stream.workspace = true
async-trait.workspace = true
aws-sdk-credential-bridge = { path = "../aws-sdk-credential-bridge" }
bb8 = { workspace = true, optional = true }
bytes.workspace = true
chrono.workspace = true
datafusion.workspace = true
fundu.workspace = true

futures.workspace = true
http.workspace = true
libnfs = { version = "0.1", optional = true }
nix = { version = "0.25", optional = true }
object_store.workspace = true
reqwest.workspace = true
serde.workspace = true
smb = { version = "0.11", optional = true }
snafu.workspace = true
ssh2 = { workspace = true, optional = true }
suppaftp = { workspace = true, optional = true }
tokio.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
insta = { workspace = true, features = ["json", "redactions"] }

[features]
ftp = ["dep:suppaftp", "dep:bb8"]
nfs = ["dep:libnfs", "dep:nix"]
