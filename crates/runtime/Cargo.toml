[features]
aws-secrets-manager = [
    "dep:aws-config",
    "dep:aws-sdk-sts",
    "runtime-secrets/aws-secrets-manager",
]
bedrock = ["dep:aws-config"]
clickhouse = [
    "dep:clickhouse-rs",
    "db_connection_pool/clickhouse",
    "data_components/clickhouse",
]
cluster = [
    "dep:ballista-core",
    "dep:ballista-scheduler",
    "dep:ballista-executor",
    "dep:datafusion-proto",
    "runtime-datafusion/cluster",
    "datafusion-optimizer-rules/cluster",
    "runtime-secrets/cluster"
]
cuda = ["llms/cuda"]
databricks = ["data_components/databricks"]
debezium = ["kafka", "data_components/debezium"]
default = [
    "cluster",
    "keyring-secret-store",
    "aws-secrets-manager",
    "sharepoint",
    "bedrock",
    "dep:datafusion-proto",
]
delta_lake = ["data_components/delta_lake"]
dev = ["openapi", "otel-arrow/dev", "mcp"]
dremio = []
duckdb = ["dep:duckdb", "db_connection_pool/duckdb", "data_components/duckdb", "datafusion-optimizer-rules/duckdb"]
dynamodb = ["dep:aws-sdk-dynamodb", "data_components/dynamodb", "dep:dynamodb-streams", "dep:humantime"]
extended_tests = []
flightsql = ["data_components/flightsql"]
ftp = ["runtime-object-store/ftp"]
iceberg-write = []
imap = ["data_components/imap", "dep:imap"]
kafka = ["data_components/kafka"]
keyring-secret-store = ["runtime-secrets/keyring-secret-store"]
mcp = ["dep:rmcp", "tools/mcp"]
metal = ["llms/metal"]
models = [
    "model_components/full",
    "mcp",
    "dep:strsim",
    "runtime-datafusion-udfs/models",
    "search/llms",
]
mongodb = ["dep:mongodb", "data_components/mongodb"]
mssql = ["dep:tiberius", "data_components/mssql"]
mysql = ["dep:mysql_async", "db_connection_pool/mysql", "data_components/mysql"]
odbc = ["db_connection_pool/odbc", "data_components/odbc"]
openapi = ["dep:utoipa-swagger-ui", "dep:utoipa", "mcp"]
oracle = ["data_components/oracle"]
postgres = [
    "db_connection_pool/postgres",
    "data_components/postgres",
    "datafusion-table-providers/postgres",
]
postgres-write = []
s3_vectors = [
    "data_components/s3_vectors",
    "dep:s3_vectors",
    "search/s3_vectors",
]
sharepoint = ["data_components/sharepoint", "dep:graph-rs-sdk"]
snapshots = ["runtime-acceleration/snapshots"]
snowflake = [
    "dep:snowflake-api",
    "db_connection_pool/snowflake",
    "data_components/snowflake",
]
spark = ["data_components/spark_connect"]
sqlite = [
    "dep:tokio-rusqlite",
    "db_connection_pool/sqlite",
    "data_components/sqlite",
    "dep:rusqlite",
]
turso = [
    "dep:turso",
    "dep:tokio-rusqlite",
    "db_connection_pool/sqlite",
    "data_components/sqlite",
    "data_components/turso",
    "dep:rusqlite",
]
vortex = ["dep:vortex-datafusion", "dep:vortex"]

[target.'cfg(not(windows))'.dependencies]
cayenne = { path = "../cayenne", features = ["turso"] }
vortex = { workspace = true, optional = true }
vortex-datafusion = { workspace = true, optional = true }

[[bench]]
harness = false
name = "prepared_statement"
