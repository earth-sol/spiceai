[package]
description = "Components for a search system "
edition.workspace = true
exclude.workspace = true
homepage.workspace = true
license.workspace = true
name = "search"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
arrow.workspace = true
arrow-json.workspace = true
arrow-schema.workspace = true
async-stream.workspace = true
async-trait.workspace = true
datafusion.workspace = true
datafusion-expr.workspace = true
futures.workspace = true
datafusion-functions-json = { workspace = true }
data_components  = { path = "../data_components", features = ["s3_vectors"] }
runtime-datafusion-index = { path = "../runtime-datafusion-index" }
runtime-table-partition = { path = "../runtime-table-partition" }
chunking = { path = "../chunking" }
serde_json.workspace = true
itertools.workspace = true
llms = {path = "../llms"}
snafu.workspace = true
tantivy = { workspace = true, optional = true }
tokio.workspace = true
tracing.workspace = true
util = { path = "../util" }

[features]
default = ["text_search"]
text_search = ["dep:tantivy"]

[dev-dependencies]
insta = { workspace = true, features = ["json"] }
tokio.workspace = true
