[package]
description = "Components for a search system "
edition.workspace = true
exclude.workspace = true
homepage.workspace = true
license.workspace = true
name = "search"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
arrow.workspace = true
arrow-json.workspace = true
arrow-schema.workspace = true
async-stream.workspace = true
async-trait.workspace = true
chunking = { path = "../chunking" }
data_components = { path = "../data_components", optional = true }
datafusion.workspace = true
datafusion-expr.workspace = true
datafusion-functions-json = { workspace = true }
datafusion-optimizer-rules = {path = "../datafusion-optimizer-rules"}
futures.workspace = true
itertools.workspace = true
llms = { path = "../llms", default-features = false, optional = true }
runtime-datafusion-index = { path = "../runtime-datafusion-index" }
runtime-table-partition = { path = "../runtime-table-partition" }
serde_json.workspace = true
snafu.workspace = true
tantivy = { workspace = true, optional = true }
tokio.workspace = true
tracing.workspace = true
util = { path = "../util" }

[features]
default = ["text_search", "s3_vectors"]
llms = ["dep:llms"]
s3_vectors = ["data_components/s3_vectors", "llms"]
text_search = ["dep:tantivy"]

[dev-dependencies]
insta = { workspace = true, features = ["json"] }
tokio.workspace = true
