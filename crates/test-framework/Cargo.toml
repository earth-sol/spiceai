[package]
edition.workspace = true
exclude.workspace = true
homepage.workspace = true
license.workspace = true
name = "test-framework"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
anyhow.workspace = true
app = { path = "../app" }
arrow = { workspace = true, features = ["prettyprint", "chrono-tz"] }
arrow-json.workspace = true
arrow-schema = { workspace = true, features = ["serde"] }
async-channel = "2.3"
async-openai.workspace = true
async-trait.workspace = true
bytes.workspace = true
chrono.workspace = true
dashmap = "6.1.0"
datafusion.workspace = true
duckdb = { optional = true, workspace = true, features = [
    "bundled",
    "r2d2",
    "vtab",
    "vtab-arrow",
] }
flight_client = { path = "../flight_client" }
futures.workspace = true
indicatif = "0.18.0"
insta.workspace = true
object_store = { workspace = true, features = ["aws", "http", "azure", "gcp"] }
octocrab = "0.49.5"
opentelemetry.workspace = true
opentelemetry-otlp.workspace = true
opentelemetry_sdk.workspace = true
otel-arrow = { path = "../../crates/otel-arrow" }
rand.workspace = true
rcgen = { version = "0.14", features = ["x509-parser"] }
regex.workspace = true
reqwest.workspace = true
rustls.workspace = true
secrecy.workspace = true
serde.workspace = true
serde_json.workspace = true
yaml = { path = "../yaml" }
spiceai = { workspace = true }
spicepod = { path = "../spicepod" }
sysinfo = "0.37.2"
telemetry = { path = "../../crates/telemetry" }
tempfile.workspace = true
time = "0.3"
tokio.workspace = true
tokio-util.workspace = true
tonic.workspace = true
util = { path = "../util" }
uuid = { workspace = true, features = ["v4"] }

[target.'cfg(not(windows))'.dependencies]
nix = { version = "0.30", features = ["signal"] }

[dev-dependencies]
rstest = "0.26.1"

[features]
anonymous_telemetry = []
aws-secrets-manager = []
clickhouse = []
databricks = []
debezium = []
delta_lake = []
dremio = []
duckdb = []
flightsql = []
ftp = []
imap = []
keyring-secret-store = []
models = []
mssql = []
mysql = []
odbc = []
postgres = []
sharepoint = []
snowflake = []
spark = []
sqlite = []
turso = []

file_append = ["dep:duckdb"]
