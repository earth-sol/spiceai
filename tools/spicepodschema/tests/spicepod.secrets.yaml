# yaml-language-server: $schema=../../../.schema/spicepod.schema.json
#
# Spicepod Schema Test: Secrets
# Tests secret store configurations
#
version: v1
kind: Spicepod
name: schema-test-secrets

# =============================================================================
# SECRETS
# =============================================================================
secrets:
  # Kubernetes secret store
  - from: kubernetes:my_secret
    name: k8s

  # Environment variable secret store
  - from: env
    name: env

  # AWS Secrets Manager (if configured)
  # - from: aws_secrets_manager:my-secret
  #   name: aws

  # GCP Secret Manager (if configured)
  # - from: gcp_secret_manager:projects/my-project/secrets/my-secret
  #   name: gcp

  # Azure Key Vault (if configured)
  # - from: azure_key_vault:https://my-vault.vault.azure.net/secrets/my-secret
  #   name: azure

  # Keyring secret store (if configured)
  # - from: keyring:my_service
  #   name: keyring