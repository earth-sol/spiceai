# yaml-language-server: $schema=../../../.schema/spicepod.schema.json
#
# Runtime Configuration Tests
# Tests runtime caching and other runtime-level settings
#
version: v1
kind: Spicepod
name: runtime-test

# =============================================================================
# RUNTIME CONFIGURATION
# =============================================================================
runtime:
  caching:
    sql_results:
      enabled: true
      max_size: 1GiB # Default 128 MiB
      item_ttl: 1m # Default 1s
      stale_while_revalidate_ttl: 30s # Default 0s (disabled)
    search_results:
      enabled: true
      max_size: 1GiB # Default 128 MiB
      item_ttl: 1m # Default 1s