[package]
description = "Spice OSS Spicepod schema"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "spicepodschema"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
schemars.workspace = true
serde.workspace = true
serde_json = "1"
regex = "1"
spicepod = { path = "../../crates/spicepod", features = ["schemars"] }

# Runtime for accessing connector/accelerator registrations
# Enable all data connector features for complete schema generation
runtime = { path = "../../crates/runtime", features = [
    # All data connectors
    "clickhouse",
    "databricks",
    "debezium",
    "delta_lake",
    "dremio",
    "duckdb",
    "dynamodb",
    "flightsql",
    "ftp",
    "imap",
    "kafka",
    "mongodb",
    "mssql",
    "mysql",
    # "nfs",  # requires system libnfs library
    # "odbc",
    "oracle",
    "postgres",
    "postgres-accel",
    "scylladb",
    "sftp",
    "sharepoint",
    "snowflake",
    "spark",
    "sqlite",
    "turso",
    # Models for model source parameters
    "models",
] }

# Extracted connector crates (for linkme registration)
connector-clickhouse = { path = "../../crates/data-connectors/connector-clickhouse" }
connector-delta-lake = { path = "../../crates/data-connectors/connector-delta-lake" }
connector-dremio = { path = "../../crates/data-connectors/connector-dremio" }
connector-duckdb = { path = "../../crates/data-connectors/connector-duckdb" }
connector-flightsql = { path = "../../crates/data-connectors/connector-flightsql" }
connector-ftp = { path = "../../crates/data-connectors/connector-ftp" }
connector-graphql = { path = "../../crates/data-connectors/connector-graphql" }
connector-imap = { path = "../../crates/data-connectors/connector-imap" }
connector-mongodb = { path = "../../crates/data-connectors/connector-mongodb" }
connector-mssql = { path = "../../crates/data-connectors/connector-mssql" }
connector-mysql = { path = "../../crates/data-connectors/connector-mysql" }
# connector-nfs requires system libnfs library
connector-oracle = { path = "../../crates/data-connectors/connector-oracle" }
connector-postgres = { path = "../../crates/data-connectors/connector-postgres" }
connector-scylladb = { path = "../../crates/data-connectors/connector-scylladb" }
connector-sftp = { path = "../../crates/data-connectors/connector-sftp" }
connector-sharepoint = { path = "../../crates/data-connectors/connector-sharepoint" }
connector-smb = { path = "../../crates/data-connectors/connector-smb" }
connector-snowflake = { path = "../../crates/data-connectors/connector-snowflake" }
connector-spark = { path = "../../crates/data-connectors/connector-spark" }

runtime-parameters = { path = "../../crates/runtime-parameters" }
