[package]
description = "Spice OSS"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "spiced"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
app = { path = "../../crates/app" }
clap = { workspace = true, features = ["derive"] }
event_stream = { path = "../../crates/event_stream" }
flightrepl = { path = "../../crates/flightrepl" }
futures.workspace = true
mimalloc = { version = "0.1.48", optional = true }
opentelemetry.workspace = true
opentelemetry-http.workspace = true
opentelemetry-prometheus.workspace = true
opentelemetry-zipkin.workspace = true
opentelemetry_sdk.workspace = true
otel-arrow = { path = "../../crates/otel-arrow" }
prometheus.workspace = true
reqwest.workspace = true
runtime = { path = "../../crates/runtime" }
runtime-async = { path = "../../crates/runtime-async" }
rustls.workspace = true
serde_yaml.workspace = true
snafu.workspace = true
snmalloc-rs = { version = "0.3.6" }
spice-cloud = { path = "../../crates/spice_cloud" }
telemetry = { path = "../../crates/telemetry" }
tikv-jemallocator = { version = "0.6.0", optional = true }
tokio.workspace = true
tpc-extension = { path = "../../crates/tpc_extension", optional = true }
tracing.workspace = true
tracing-log = "0.2.0"
tracing-opentelemetry.workspace = true
tracing-subscriber.workspace = true
util = { path = "../../crates/util" }

# Non-default features should be added to `lint-rust` make target.
[features]
alloc-jemalloc = ["dep:tikv-jemallocator"]
alloc-mimalloc = ["dep:mimalloc"]
alloc-snmalloc = []
alloc-system = []
anonymous_telemetry = ["telemetry/anonymous_telemetry"]
aws-secrets-manager = ["runtime/aws-secrets-manager"]
clickhouse = ["runtime/clickhouse"]
cuda = ["runtime/cuda"]
databricks = ["runtime/databricks"]
debezium = ["runtime/debezium"]
default = [
    "duckdb",
    "postgres",
    "sqlite",
    "mysql",
    "flightsql",
    "delta_lake",
    "databricks",
    "dremio",
    "clickhouse",
    "sharepoint",
    "snapshots",
    "snowflake",
    "spark",
    "ftp",
    "sftp",
    "debezium",
    "kafka",
    "anonymous_telemetry",
    "mssql",
    "dynamodb",
    "imap",
    "alloc-snmalloc",
    "oracle",
    "runtime/s3_vectors",
    "mongodb",
    "iceberg-write",
    "turso",
    "smb",
    "pingora",
    "scylladb",
]
delta_lake = ["runtime/delta_lake"]
dev = ["runtime/dev"]
dremio = ["runtime/dremio"]
duckdb = ["runtime/duckdb"]
dynamodb = ["runtime/dynamodb"]
flightsql = ["runtime/flightsql"]
ftp = ["runtime/ftp"]
iceberg-write = ["runtime/iceberg-write"]
imap = ["runtime/imap"]
kafka = ["runtime/kafka"]
keyring-secret-store = ["runtime/keyring-secret-store"]
mcp = ["runtime/mcp"]
metal = ["runtime/metal"]
models = ["runtime/models"]
mongodb = ["runtime/mongodb"]
mssql = ["runtime/mssql"]
mysql = ["runtime/mysql"]
nfs = ["runtime/nfs"]
odbc = ["runtime/odbc"]
oracle = ["runtime/oracle"]
pingora = ["runtime/pingora"]
postgres = ["runtime/postgres"]
postgres-write = ["runtime/postgres-write"]
release = []
scylladb = ["runtime/scylladb"]
sftp = ["runtime/sftp"]
sharepoint = ["runtime/sharepoint"]
smb = ["runtime/smb"]
snapshots = ["runtime/snapshots"]
snowflake = ["runtime/snowflake"]
spark = ["runtime/spark"]
sqlite = ["runtime/sqlite"]
tpc-extension = ["dep:tpc-extension"]
turso = ["runtime/turso"]
