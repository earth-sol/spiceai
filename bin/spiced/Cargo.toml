[package]
description = "Spice OSS"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "spiced"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
app = { path = "../../crates/app" }
clap = { workspace = true, features = ["derive"] }
connector-clickhouse = { path = "../../crates/data-connectors/connector-clickhouse", optional = true }
connector-databricks = { path = "../../crates/data-connectors/connector-databricks", optional = true }
connector-delta-lake = { path = "../../crates/data-connectors/connector-delta-lake", optional = true }
connector-dremio = { path = "../../crates/data-connectors/connector-dremio", optional = true }
connector-duckdb = { path = "../../crates/data-connectors/connector-duckdb", optional = true }
connector-flightsql = { path = "../../crates/data-connectors/connector-flightsql", optional = true }
connector-ftp = { path = "../../crates/data-connectors/connector-ftp", optional = true }
connector-graphql = { path = "../../crates/data-connectors/connector-graphql" }
connector-imap = { path = "../../crates/data-connectors/connector-imap", optional = true }
connector-sftp = { path = "../../crates/data-connectors/connector-sftp", optional = true }
connector-mongodb = { path = "../../crates/data-connectors/connector-mongodb", optional = true }
connector-mssql = { path = "../../crates/data-connectors/connector-mssql", optional = true }
connector-mysql = { path = "../../crates/data-connectors/connector-mysql", optional = true }
# connector-nfs requires system libnfs library - build separately with `nfs` feature
connector-nfs = { path = "../../crates/data-connectors/connector-nfs", optional = true }
connector-odbc = { path = "../../crates/data-connectors/connector-odbc", optional = true }
connector-oracle = { path = "../../crates/data-connectors/connector-oracle", optional = true }
connector-postgres = { path = "../../crates/data-connectors/connector-postgres", optional = true }
connector-scylladb = { path = "../../crates/data-connectors/connector-scylladb", optional = true }
connector-sharepoint = { path = "../../crates/data-connectors/connector-sharepoint", optional = true }
connector-smb = { path = "../../crates/data-connectors/connector-smb", optional = true }
connector-snowflake = { path = "../../crates/data-connectors/connector-snowflake", optional = true }
connector-spark = { path = "../../crates/data-connectors/connector-spark", optional = true }
event_stream = { path = "../../crates/event_stream" }
repl = { path = "../../crates/repl" }
futures.workspace = true
mimalloc = { version = "0.1.48", optional = true }
opentelemetry.workspace = true
opentelemetry-http.workspace = true
opentelemetry-prometheus.workspace = true
opentelemetry-zipkin.workspace = true
opentelemetry_sdk.workspace = true
otel-arrow = { path = "../../crates/otel-arrow" }
prometheus.workspace = true
reqwest.workspace = true
runtime = { path = "../../crates/runtime" }
runtime-async = { path = "../../crates/runtime-async" }
rustls.workspace = true
serde_yaml.workspace = true
snafu.workspace = true
snmalloc-rs = { version = "0.3.6" }
spice-cloud = { path = "../../crates/spice_cloud" }
telemetry = { path = "../../crates/telemetry" }
tikv-jemallocator = { version = "0.6.0", optional = true }
tokio.workspace = true
tpc-extension = { path = "../../crates/tpc_extension", optional = true }
tracing.workspace = true
tracing-log = "0.2.0"
tracing-opentelemetry.workspace = true
tracing-subscriber.workspace = true
util = { path = "../../crates/util" }

# Non-default features should be added to `lint-rust` make target.
[features]
alloc-jemalloc = ["dep:tikv-jemallocator"]
alloc-mimalloc = ["dep:mimalloc"]
alloc-snmalloc = []
alloc-system = []
anonymous_telemetry = ["telemetry/anonymous_telemetry"]
aws-secrets-manager = ["runtime/aws-secrets-manager"]
clickhouse = ["connector-clickhouse", "runtime/clickhouse"]
cuda = ["runtime/cuda"]
databricks = ["connector-databricks", "runtime/databricks"]
debezium = ["runtime/debezium"]
default = [
    "duckdb",
    "postgres",
    "sqlite",
    "mysql",
    "flightsql",
    "delta_lake",
    "databricks",
    "dremio",
    "clickhouse",
    "sharepoint",
    "snapshots",
    "snowflake",
    "spark",
    "ftp",
    "sftp",
    "debezium",
    "kafka",
    "anonymous_telemetry",
    "mssql",
    "dynamodb",
    "imap",
    "alloc-snmalloc",
    "oracle",
    "runtime/s3_vectors",
    "mongodb",
    "iceberg-write",
    "turso",
    "smb",
    "pingora",
    "scylladb",
    "models",
]
delta_lake = ["connector-delta-lake", "runtime/delta_lake"]
dev = ["runtime/dev"]
dremio = ["connector-dremio", "runtime/dremio"]
duckdb = ["connector-duckdb", "runtime/duckdb"]
dynamodb = ["runtime/dynamodb"]
flightsql = ["connector-flightsql", "runtime/flightsql"]
ftp = ["connector-ftp", "runtime/ftp"]
iceberg-write = ["runtime/iceberg-write"]
imap = ["connector-imap", "runtime/imap"]
kafka = ["runtime/kafka"]
keyring-secret-store = ["runtime/keyring-secret-store"]
mcp = ["runtime/mcp"]
metal = ["runtime/metal"]
models = ["runtime/models"]
mongodb = ["connector-mongodb", "runtime/mongodb"]
mssql = ["connector-mssql", "runtime/mssql"]
mysql = ["connector-mysql", "runtime/mysql"]
# nfs feature requires system libnfs library and connector-nfs crate
nfs = ["connector-nfs", "runtime/nfs"]
odbc = ["connector-odbc"]
oracle = ["connector-oracle", "runtime/oracle"]
pingora = ["runtime/pingora"]
postgres = ["connector-postgres", "runtime/postgres"]
postgres-accel = ["runtime/postgres-accel"]
postgres-write = ["runtime/postgres-write"]
release = []
scylladb = ["connector-scylladb", "runtime/scylladb"]
sftp = ["connector-sftp", "runtime/sftp"]
sharepoint = ["connector-sharepoint", "runtime/sharepoint"]
smb = ["connector-smb"]
snapshots = ["runtime/snapshots"]
snowflake = ["connector-snowflake", "runtime/snowflake"]
spark = ["connector-spark", "runtime/spark"]
sqlite = ["runtime/sqlite"]
tpc-extension = ["dep:tpc-extension"]
turso = ["runtime/turso"]
vortex = ["runtime/vortex"]
