version: v1
kind: Spicepod
name: financebench

models:
  - name: gpt-4o
    from: openai:gpt-4o-2024-08-06
    datasets: 
      - financebench.data
    params:
      tools: list_datasets, table_schema, document_similarity
      openai_api_key: ${ secrets:OPENAI_API_KEY}
      system_prompt: |
        # Role and Objective
        You are a financial expert tasked with answering questions based solely on `financebench.data`. 
        - Search documents to identify accurate and relevant information.
        - Provide concise, structured answers based on retrieved data.
        - If the answer is not found, respond with "I don't know".

        # Search Guidelines
        - Use the document_similarity tool for searches.
        - Don't include 'content' to additional columns during search.
        - Query both 'content' and 'location' columns.
        - Limit search results to the top 3 items.
        - Don't include keywords in the search.
        - Perform a second search if initial results are insufficient.

        # General Guidelines
        - Do not generate information not found in the data.
        - Use your financial expertise, reasoning, and critical thinking to provide a complete and accurate answer.
        - Include all references ('location' column) to documents used.
        - Keep responses under 512 characters.

  - name: judge
    from: openai:gpt-4o
    params:
      openai_api_key: ${ secrets:SPICE_OPENAI_API_KEY }
      parameterized_prompt: enabled
      system_prompt: |
        You are a financial expert. Score the correctness of the answer below between 0.0 and 1.0.
        Use 0 if the answer is wrong or information was not found and 1.0 if the answer is correct.
        Question: '{{ input }}'
        Correct answer: '{{ ideal }}'
        Actual answer to score: '{{ actual }}'
      openai_response_format:
        type: json_schema
        json_schema:
          name: judge
          schema:
            type: object
            properties:
              score:
                type: number
                format: float
            additionalProperties: true
            required:
              - score
        strict: false

views:
  - name: financebench.evals
    sql: |
      SELECT financebench_id, question as input, answer as ideal, company, doc_name, question_type, question_reasoning, justification, evidence from financebench.tests_oss

evals:
  - name: financebench
    dataset: financebench.evals
    scorers:
      - judge

datasets:
  - from: spice.ai/spiceai/financebench/datasets/spice.financebench.data
    name: financebench.data
    description: Financial information
    params:
      spiceai_api_key: ${ secrets:SPICEAI_FINANCEBENCH_API_KEY }
      spiceai_endpoint: https://flight.spiceai.io
    acceleration:
      enabled: true
      # https://github.com/spiceai/spiceai/issues/5143
      refresh_sql: |
        select * from financebench.data limit 50;
    embeddings:
      - column: content
        use: openai_embed
        column_pk:
        - location
  
  - from: spice.ai/spiceai/financebench/datasets/spice.financebench.tests_oss
    description: Dataset for evaluating model performance. Must be ignored by the model.
    name: financebench.tests_oss
    params:
      spiceai_api_key: ${ secrets:SPICEAI_FINANCEBENCH_API_KEY }
      spiceai_endpoint: https://flight.spiceai.io
    acceleration:
      enabled: true

embeddings:
  - from: openai:text-embedding-3-small
    name: openai_embed
    params:
      openai_api_key: ${secrets:OPENAI_API_KEY}
