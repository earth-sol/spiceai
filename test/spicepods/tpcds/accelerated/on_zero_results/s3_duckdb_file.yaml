version: v1
kind: Spicepod
name: s3_duckdb_file_on_zero_results
datasets:
  - from: s3://benchmarks/tpcds_sf1/catalog_sales/
    name: catalog_sales
    params: &s3_params
      file_format: parquet
      allow_http: true
      s3_auth: key
      s3_endpoint: ${secrets:S3_ENDPOINT}
      s3_key: ${secrets:S3_KEY}
      s3_secret: ${secrets:S3_SECRET}
    acceleration:
      engine: duckdb
      mode: file
      enabled: true
      refresh_sql: 'SELECT * FROM catalog_sales LIMIT 0'
      on_zero_results: use_source
  - from: s3://benchmarks/tpcds_sf1/catalog_returns/
    name: catalog_returns
    params: *s3_params
    acceleration:
