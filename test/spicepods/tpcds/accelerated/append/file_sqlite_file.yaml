    name: call_center
    time_column: cc_created_at
    acceleration: *acceleration
  - from: file:income_band.parquet
    name: income_band
    time_column: ib_created_at
    acceleration: *acceleration
  - from: file:catalog_page.parquet
    name: catalog_page
