  - from: file:ship_mode.parquet
    name: ship_mode
    time_column: sm_created_at
    acceleration: *acceleration
  - from: file:store.parquet
    name: store
    time_column: s_created_at
    acceleration: *acceleration
  - from: file:time_dim.parquet
    name: time_dim
    time_column: t_created_at
    acceleration: *acceleration
