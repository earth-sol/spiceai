version: v1
kind: Spicepod
name: iceberg[hadoop]-federated

datasets:
  - from: iceberg:s3a://benchmarks/hadoop/tpcds/catalog_sales
    name: catalog_sales
    params: &hadoop_params
      iceberg_s3_endpoint: ${secrets:S3_ENDPOINT}
      iceberg_s3_access_key_id: ${secrets:S3_KEY}
      iceberg_s3_secret_access_key: ${secrets:S3_SECRET}
      iceberg_s3_region: us-east-1
  - from: iceberg:s3a://benchmarks/hadoop/tpcds/catalog_returns
    name: catalog_returns
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpcds/inventory
    name: inventory
    params: *hadoop_params
