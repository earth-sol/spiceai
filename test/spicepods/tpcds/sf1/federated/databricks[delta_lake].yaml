version: v1
kind: Spicepod
name: databricks[delta_lake]-federated
datasets:
  - from: databricks:spiceai_sandbox.tpcds_sf1.item
    name: item
    params: &databricks_delta_params
      mode: delta_lake
      client_timeout: 600s
      databricks_aws_region: us-west-2
      databricks_aws_access_key_id: ${ env:AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }
      databricks_aws_secret_access_key: ${ env:AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }
      databricks_token: ${ env:NEW_DATABRICKS_TOKEN }
      databricks_endpoint: ${ env:NEW_DATABRICKS_HOST }
  - from: databricks:spiceai_sandbox.tpcds_sf1.call_center
    name: call_center
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.catalog_page
    name: catalog_page
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.catalog_sales
    name: catalog_sales
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.catalog_returns
    name: catalog_returns
    params: *databricks_delta_params
