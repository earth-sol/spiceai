    name: income_band
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.inventory
    name: inventory
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.store_sales
    name: store_sales
    params: *databricks_delta_params
  - from: databricks:spiceai_sandbox.tpcds_sf1.store_returns
