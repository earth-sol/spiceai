version: v1
kind: Spicepod
name: odbc[databricks]-federated
datasets:
  - from: odbc:spiceai_sandbox.tpcds_sf1.catalog_sales
    name: catalog_sales
    params: &odbc_params
      odbc_connection_string: |
        Driver={Databricks ODBC Driver};
        Host=${ env:NEW_DATABRICKS_HOST };
        Port=443;
        HTTPPath=${ env:DATABRICKS_ODBC_PATH };
        SSL=1;
        ThriftTransport=2;
        AuthMech=3;
        UID=token;
        PWD=${ env:NEW_DATABRICKS_TOKEN }
  - from: odbc:spiceai_sandbox.tpcds_sf1.catalog_returns
    name: catalog_returns
    params: *odbc_params
  - from: odbc:spiceai_sandbox.tpcds_sf1.inventory
