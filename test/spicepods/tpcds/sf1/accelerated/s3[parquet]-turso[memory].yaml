version: v1
kind: Spicepod
name: s3[parquet]-turso[memory]
datasets:
  - from: s3:catalog_sales.parquet
    name: catalog_sales
    params: &s3_params
      s3_endpoint: http://minio:9000
      s3_region: us-east-1
      s3_bucket: tpcds-sf1
      s3_key: data
      s3_access_key_id: ${secrets:AWS_ACCESS_KEY_ID}
      s3_secret_access_key: ${secrets:AWS_SECRET_ACCESS_KEY}
    acceleration: &acceleration
      engine: turso
      mode: memory
      enabled: true
  - from: s3:catalog_returns.parquet
    name: catalog_returns
    params: *s3_params
    acceleration: *acceleration
  - from: s3:inventory.parquet
    name: inventory
    params: *s3_params
    acceleration: *acceleration
  - from: s3:store_sales.parquet
    name: store_sales
    params: *s3_params
    acceleration: *acceleration
  - from: s3:store_returns.parquet
    name: store_returns
    params: *s3_params
    acceleration: *acceleration
