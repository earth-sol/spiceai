version: v1
kind: Spicepod
name: spicecloud-duckdb[file]
datasets:
  - from: spice.ai:spiceai/benchmarks-tpcds/datasets/tpcds.catalog_sales
    name: catalog_sales
    acceleration: &acceleration
      enabled: true
      engine: duckdb
      mode: file
      params:
        connection_pool_size: 25
    params: &spicecloud_params
      spiceai_api_key: ${secrets:SPICEAI_TEST_TPCDS_API_KEY}
      spiceai_endpoint: ${secrets:SPICEAI_TEST_ENDPOINT}
