version: v1
kind: Spicepod
name: financebench

runtime:
  flight:
    max_message_size: 1G

dependencies:
  - models
  - evals

datasets:
  - from: spice.ai/spiceai/financebench/datasets/spice.financebench.data
    name: financebench.data
    description: Financial information
    params:
      spiceai_api_key: ${ secrets:SPICEAI_FINANCEBENCH_API_KEY }
      spiceai_endpoint: https://flight.spiceai.io
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
    columns:
      - name: content
        embeddings:
          - from: openai_embed
            row_id: location
