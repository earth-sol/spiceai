version: v1
kind: Spicepod
name: s3[parquet]-duckdb[file]-cache_1gb_ahash
runtime:
  results_cache:
    enabled: true
    cache_max_size: 1Gib
    item_ttl: 60s
    hashing_algorithm: ahash
datasets:
  - from: s3://benchmarks/tpch_sf1/customer/
    name: customer
    params: &s3_params
      file_format: parquet
      allow_http: true
      s3_auth: key
      s3_endpoint: ${secrets:S3_ENDPOINT}
      s3_key: ${secrets:S3_KEY}
      s3_secret: ${secrets:S3_SECRET}
  - from: s3://benchmarks/tpch_sf1/lineitem/
    name: lineitem
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/nation/
    name: nation
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/orders/
    name: orders
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/part/
    name: part
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/partsupp/
    name: partsupp
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/region/
    name: region
    params: *s3_params
  - from: s3://benchmarks/tpch_sf1/supplier/
    name: supplier
    params: *s3_params
