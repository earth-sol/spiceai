# This tests the Standard V2 storage account type with versioning enabled,
# as opposed to `abfs[parquet].yaml` which tests ADLS Gen2 with hierarchical namespace enabled.
#
# The Standard V2 account does not have hierarchical namespace enabled (versioning and hierarchical namespace are mutually exclusive).
version: v1
kind: Spicepod
name: abfs_standard_versioned[parquet]-federated
datasets:
  - from: abfs://data/tpch/customer/
    name: customer
    params: &abfs_params
      file_format: parquet
      abfs_account: spiceaidemodataversioned
      abfs_skip_signature: true
  - from: abfs://data/tpch/lineitem/
    name: lineitem
    params: *abfs_params
  - from: abfs://data/tpch/nation/
    name: nation
    params: *abfs_params
  - from: abfs://data/tpch/orders/
    name: orders
    params: *abfs_params
  - from: abfs://data/tpch/part/
    name: part
    params: *abfs_params
  - from: abfs://data/tpch/partsupp/
    name: partsupp
    params: *abfs_params
  - from: abfs://data/tpch/region/
    name: region
    params: *abfs_params
  - from: abfs://data/tpch/supplier/
    name: supplier
    params: *abfs_params
