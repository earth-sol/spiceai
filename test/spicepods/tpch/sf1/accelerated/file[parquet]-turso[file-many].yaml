version: v1
kind: Spicepod
name: file[parquet]-turso[file-many]
datasets:
  - from: file:data/customer.parquet
    name: customer
    acceleration:
      enabled: true
      engine: turso
      mode: file
      params:
        turso_file: .spice/data/customer.db
  - from: file:data/lineitem.parquet
    name: lineitem
    acceleration:
      enabled: true
      engine: turso
      mode: file
      params:
        turso_file: .spice/data/lineitem.db
  - from: file:data/nation.parquet
    name: nation
    acceleration:
