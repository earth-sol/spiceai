    time_column: o_created_at
    time_format: timestamptz
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_mode: append
      refresh_check_interval: *refresh_check_interval
      primary_key: o_orderkey
      on_conflict:
