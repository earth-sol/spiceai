  - from: file:region.parquet
    name: region
    time_column: r_created_at
    time_format: timestamptz
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_mode: append
      refresh_check_interval: *refresh_check_interval
      primary_key: r_regionkey
      on_conflict:
        r_regionkey: upsert
      retention_check_enabled: true
