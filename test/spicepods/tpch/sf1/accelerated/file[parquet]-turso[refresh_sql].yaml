version: v1
kind: Spicepod
name: file[parquet]-turso[refresh_sql]
datasets:
  - from: file:data/customer.parquet
    name: customer
    acceleration:
      enabled: true
      engine: turso
      mode: file
      refresh_sql: 'SELECT * FROM customer WHERE c_acctbal > 0'
  - from: file:data/lineitem.parquet
    name: lineitem
    acceleration:
      enabled: true
      engine: turso
      mode: file
      refresh_sql: 'SELECT * FROM lineitem WHERE l_quantity > 10'
  - from: file:data/nation.parquet
    name: nation
    acceleration:
      enabled: true
      engine: turso
      mode: file
  - from: file:data/orders.parquet
    name: orders
    acceleration:
      enabled: true
      engine: turso
      mode: file
      refresh_sql: 'SELECT * FROM orders WHERE o_totalprice > 1000'
  - from: file:data/part.parquet
    name: part
    acceleration:
      enabled: true
      engine: turso
      mode: file
      refresh_sql: 'SELECT * FROM part WHERE p_retailprice > 100'
  - from: file:data/partsupp.parquet
    name: partsupp
    acceleration:
      enabled: true
      engine: turso
      mode: file
  - from: file:data/region.parquet
    name: region
    acceleration:
      enabled: true
      engine: turso
      mode: file
  - from: file:data/supplier.parquet
    name: supplier
    acceleration:
      enabled: true
      engine: turso
      mode: file
      refresh_sql: 'SELECT * FROM supplier WHERE s_acctbal > 0'
