version: v1
kind: Spicepod
  name: spark[databricks]-arrow
datasets:
  - from: spark:spiceai_sandbox.tpch_sf1.customer
    name: customer
    params: &spark_params
      spark_remote: |
        sc://${ env:NEW_DATABRICKS_HOST }:443/;
        use_ssl=true;
        user_id=spice.ai;
        session_id=spark_tpch_test;
        token=${ env:NEW_DATABRICKS_TOKEN };
        x-databricks-cluster-id=${ env:NEW_DATABRICKS_CLUSTER_ID };
    acceleration: &acceleration
      enabled: true
      engine: arrow
  - from: spark:spiceai_sandbox.tpch_sf1.lineitem
    name: lineitem
    params: *spark_params
    acceleration: *acceleration
  - from: spark:spiceai_sandbox.tpch_sf1.nation
    name: nation
    params: *spark_params
    acceleration: *acceleration
  - from: spark:spiceai_sandbox.tpch_sf1.orders
    name: orders
    params: *spark_params
    acceleration: *acceleration
  - from: spark:spiceai_sandbox.tpch_sf1.part
    name: part
    params: *spark_params
  - from: spark:spiceai_sandbox.tpch_sf1.partsupp
    name: partsupp
    params: *spark_params
    acceleration: *acceleration
  - from: spark:spiceai_sandbox.tpch_sf1.region
    name: region
    params: *spark_params
    acceleration: *acceleration
  - from: spark:spiceai_sandbox.tpch_sf1.supplier
    name: supplier
    params: *spark_params
    acceleration: *acceleration
