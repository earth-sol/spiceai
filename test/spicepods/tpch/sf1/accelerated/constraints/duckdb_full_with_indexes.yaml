version: v1
kind: Spicepod
name: tpch-indexes

extensions:
  tpc:
    enabled: true
    params:
      benchmark: tpch
      scale_factor: "1"
      path: .spice/tpch.db

runtime:
  task_history:
    enabled: true
    captured_output: truncated
  caching:
    sql_results:
      enabled: false

defaults: &default_params
  duckdb_open: .spice/tpch.db

datasets:
  - from: duckdb:customer
    name: customer
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: &default_refresh_check_interval 10s
      indexes:
        c_mktsegment: enabled

  - from: duckdb:lineitem
    name: lineitem
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval
      indexes:
        l_orderkey: enabled
        l_shipdate: enabled

  - from: duckdb:nation
    params: *default_params
    name: nation
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval
      indexes:
        n_regionkey: enabled
    
  - from: duckdb:orders
    name: orders
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval
      indexes:
        '(o_custkey, o_orderkey)': unique

  - from: duckdb:part
    name: part
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval

  - from: duckdb:partsupp
    name: partsupp
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval

  - from: duckdb:region
    name: region
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval
  
  - from: duckdb:supplier
    name: supplier
    params: *default_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      refresh_check_interval: *default_refresh_check_interval
  