version: v1
kind: Spicepod
name: s3[parquet]-duckdb[file]-refresh-1s
runtime:
  params:
    dedicated_thread_pool: sql_engine
datasets:
  - from: s3://benchmarks/tpch_sf1/customer.parquet
    name: customer
    params: &s3_params
      file_format: parquet
      allow_http: true
      s3_auth: key
      s3_endpoint: ${secrets:S3_ENDPOINT}
      s3_key: ${secrets:S3_KEY}
      s3_secret: ${secrets:S3_SECRET}
    acceleration: &acceleration
      enabled: true
      engine: duckdb
      mode: file
      refresh_mode: full
      refresh_check_interval: 1s
  - from: s3://benchmarks/tpch_sf1/lineitem.parquet
    name: lineitem
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/nation.parquet
    name: nation
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/orders.parquet
    name: orders
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/part.parquet
    name: part
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/partsupp.parquet
    name: partsupp
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/region.parquet
    name: region
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/supplier.parquet
    name: supplier
    params: *s3_params
    acceleration: *acceleration
