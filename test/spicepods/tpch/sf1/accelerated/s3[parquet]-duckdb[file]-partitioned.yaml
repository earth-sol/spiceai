version: v1
kind: Spicepod
name: s3[parquet]-duckdb[file]-partitioned
datasets:
  - from: s3://benchmarks/tpch_sf1/customer.parquet
    name: customer
    params: &s3_params
      file_format: parquet
      allow_http: true
      s3_auth: key
      s3_endpoint: ${secrets:S3_ENDPOINT}
      s3_key: ${secrets:S3_KEY}
      s3_secret: ${secrets:S3_SECRET}
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      partition_by:
        - bucket(5, c_name)
      params:
        partition_mode: tables
  - from: s3://benchmarks/tpch_sf1/lineitem.parquet
    name: lineitem
    params: *s3_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      partition_by:
        - date_part('year', l_shipdate)
      params:
        partition_mode: tables
  - from: s3://benchmarks/tpch_sf1/nation.parquet
    name: nation
    params: *s3_params
    acceleration: &acceleration
      enabled: true
      engine: duckdb
      mode: file
  - from: s3://benchmarks/tpch_sf1/orders.parquet
    name: orders
    params: *s3_params
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      partition_by:
        - bucket(5, o_custkey)
      params:
        partition_mode: tables
  - from: s3://benchmarks/tpch_sf1/part.parquet
    name: part
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/partsupp.parquet
    name: partsupp
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/region.parquet
    name: region
    params: *s3_params
    acceleration: *acceleration
  - from: s3://benchmarks/tpch_sf1/supplier.parquet
    name: supplier
    params: *s3_params
    acceleration: *acceleration

  # Known good reference datasets for validation
  - from: s3://benchmarks/tpch_sf1/customer.parquet
    name: arrow.customer
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/lineitem.parquet
    name: arrow.lineitem
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/nation.parquet
    name: arrow.nation
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/orders.parquet
    name: arrow.orders
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/part.parquet
    name: arrow.part
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/partsupp.parquet
    name: arrow.partsupp
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/region.parquet
    name: arrow.region
    params: *s3_params

  - from: s3://benchmarks/tpch_sf1/supplier.parquet
    name: arrow.supplier
    params: *s3_params
