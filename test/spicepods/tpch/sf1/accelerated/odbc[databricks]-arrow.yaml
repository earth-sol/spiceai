version: v1
kind: Spicepod
name: odbc[databricks]-arrow
datasets:
  - from: odbc:spiceai_sandbox.tpch_sf1.customer
    name: customer
    params: &odbc_params
      odbc_connection_string: |
        Driver={Databricks ODBC Driver};
        Host=${ env:NEW_DATABRICKS_HOST };
        Port=443;
        HTTPPath=${ env:NEW_DATABRICKS_ODBC_PATH };
        SSL=1;
        ThriftTransport=2;
        AuthMech=3;
        UID=token;
        PWD=${ env:NEW_DATABRICKS_TOKEN }
    acceleration: &acceleration
      enabled: true
      engine: arrow
  - from: odbc:spiceai_sandbox.tpch_sf1.lineitem
    name: lineitem
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.nation
    name: nation
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.orders
    name: orders
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.part
    name: part
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.partsupp
    name: partsupp
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.region
    name: region
    params: *odbc_params
    acceleration: *acceleration
  - from: odbc:spiceai_sandbox.tpch_sf1.supplier
    name: supplier
    params: *odbc_params
    acceleration: *acceleration
