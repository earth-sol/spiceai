version: v1
kind: Spicepod
name: databricks[delta_lake]-arrow
datasets:
  - from: databricks:spiceai_sandbox.tpch_sf1.partsupp
    name: partsupp
    params: &databricks_delta_params
      mode: delta_lake
      client_timeout: 600s
      databricks_aws_region: us-west-2
      databricks_aws_access_key_id: ${ secrets:AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }
      databricks_aws_secret_access_key: ${ secrets:AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }
      databricks_token: ${ secrets:DATABRICKS_TOKEN }
      databricks_endpoint: ${ secrets:DATABRICKS_HOST }
    acceleration: &acceleration
      enabled: true
      engine: arrow
  - from: databricks:spiceai_sandbox.tpch_sf1.customer
    name: customer
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.lineitem
    name: lineitem
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.nation
    name: nation
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.orders
    name: orders
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.region
    name: region
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.supplier
    name: supplier
    params: *databricks_delta_params
    acceleration: *acceleration
  - from: databricks:spiceai_sandbox.tpch_sf1.part
    name: part
    params: *databricks_delta_params
    acceleration: *acceleration
