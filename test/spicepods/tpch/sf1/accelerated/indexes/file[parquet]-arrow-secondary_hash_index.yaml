version: v1
kind: Spicepod
name: file[parquet]-arrow-secondary_hash_index
datasets:
  - from: file:data/customer.parquet
    name: customer
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        c_name: unique
      params:
        hash_index: enabled
  - from: file:data/nation.parquet
    name: nation
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        n_name: unique
      params:
        hash_index: enabled
  - from: file:data/orders.parquet
    name: orders
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        o_orderkey: unique
      params:
        hash_index: enabled
  - from: file:data/part.parquet
    name: part
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        p_name: unique
      params:
        hash_index: enabled
  - from: file:data/region.parquet
    name: region
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        r_name: unique
      params:
        hash_index: enabled
  - from: file:data/supplier.parquet
    name: supplier
    acceleration:
      enabled: true
      engine: arrow
      indexes:
        s_name: unique
      params:
        hash_index: enabled
  # lineitem and partsupp don't have natural unique columns for secondary index
  - from: file:data/lineitem.parquet
    name: lineitem
    acceleration:
      enabled: true
      engine: arrow
  - from: file:data/partsupp.parquet
    name: partsupp
    acceleration:
      enabled: true
      engine: arrow
