version: v1
kind: Spicepod
name: file[parquet]-turso[file]-indexes
datasets:
  - from: file:data/customer.parquet
    name: customer
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: c_custkey
      indexes:
        c_phone: enabled
        c_acctbal: enabled
  - from: file:data/lineitem.parquet
    name: lineitem
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: (l_orderkey, l_linenumber)
      indexes:
        l_orderkey: enabled
        l_suppkey: enabled
        l_discount: enabled
        l_shipdate: enabled
        l_partkey: enabled
        l_quantity: enabled
        (l_shipdate, l_receiptdate): enabled
  - from: file:data/nation.parquet
    name: nation
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: n_nationkey
      indexes:
        (n_nationkey, n_regionkey): enabled
  - from: file:data/orders.parquet
    name: orders
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: o_orderkey
      indexes:
        o_orderdate: enabled
        o_custkey: enabled
        (o_orderdate, o_custkey): enabled
  - from: file:data/part.parquet
    name: part
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: p_partkey
      indexes:
        p_brand: enabled
        p_container: enabled
        (p_brand, p_container): enabled
  - from: file:data/partsupp.parquet
    name: partsupp
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: (ps_partkey, ps_suppkey)
  - from: file:data/region.parquet
    name: region
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: r_regionkey
  - from: file:data/supplier.parquet
    name: supplier
    acceleration:
      enabled: true
      engine: turso
      mode: file
      primary_key: s_suppkey
      indexes:
        s_nationkey: enabled
