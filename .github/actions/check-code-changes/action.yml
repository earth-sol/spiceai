name: 'Check Code Changes'
description: 'Detects if there are relevant code changes that require running tests'

outputs:
  relevant_changes:
    description: 'Whether there are relevant code changes'
    value: ${{ steps.check_changes.outputs.relevant_changes }}

runs:
  using: 'composite'
  steps:
    - name: Detect all code changes
      id: changed-code-files
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
      with:
        filters: |
          code_changes:
            - 'crates/**'
            - 'bin/**'
            - 'test/**'
            - 'tools/**'
            - 'install/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'go.mod'
            - 'go.sum'

    - name: Check for relevant changes
      id: check_changes
      shell: bash
      run: |
        echo "relevant_changes=${{ steps.changed-code-files.outputs.code_changes }}" >> $GITHUB_OUTPUT
