name: Installs the cc toolchain
description: 'composite action'
inputs:
  os:
    description: 'Operating system to install make for'
    default: 'linux' # 'linux', 'windows','macos'

runs:
  using: 'composite'
  steps:
    - name: Install cc
      if: inputs.os == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config libssl-dev unixodbc unixodbc-dev protobuf-compiler
