name: Build Testoperator
description: 'Builds the testoperator binary with caching based on commit SHA'

inputs:
  install_to_system_path:
    description: 'Whether to install testoperator to system path'
    required: false
    default: 'true'
  upload_artifact:
    description: 'Whether to upload the testoperator as an artifact'
    required: false
    default: 'false'
  force_rebuild:
    description: 'Whether to force a rebuild (skip cache)'
    required: false
    default: 'false'
  download_from_minio:
    description: 'Whether to try downloading from MinIO before checking GitHub cache'
    required: false
    default: 'true'

outputs:
  cache-hit:
    description: 'Whether the testoperator was found in cache'
    value: ${{ steps.cache-testoperator.outputs.cache-hit }}
  testoperator-path:
    description: 'Path to the testoperator binary'
    value: ${{ steps.set-path.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Detect OS
      id: detect-os
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Linux)
            echo "os=linux" >> $GITHUB_OUTPUT
            echo "ext=" >> $GITHUB_OUTPUT
            ;;
          macOS)
            echo "os=darwin" >> $GITHUB_OUTPUT
            echo "ext=" >> $GITHUB_OUTPUT
            ;;
          Windows)
            echo "os=windows" >> $GITHUB_OUTPUT
            echo "ext=.exe" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "Unsupported OS: $RUNNER_OS"
            exit 1
            ;;
        esac

    - name: Set testoperator commit SHA
      id: commit-sha
      shell: bash
      run: |
        echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Download testoperator from MinIO
      if: inputs.download_from_minio == 'true' && inputs.force_rebuild != 'true'
      id: minio-download
      shell: bash
      run: |
        if mc stat spice-minio/artifacts/testoperator/${{ steps.detect-os.outputs.os }}-x86_64/${{ steps.commit-sha.outputs.sha }}/testoperator${{ steps.detect-os.outputs.ext }}; then
          echo "Found testoperator in MinIO"
          mkdir -p target/release
          mc cp spice-minio/artifacts/testoperator/${{ steps.detect-os.outputs.os }}-x86_64/${{ steps.commit-sha.outputs.sha }}/testoperator${{ steps.detect-os.outputs.ext }} target/release/testoperator${{ steps.detect-os.outputs.ext }}
          chmod +x target/release/testoperator${{ steps.detect-os.outputs.ext }}
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "Testoperator not found in MinIO"
          echo "found=false" >> $GITHUB_OUTPUT
        fi

    - name: Cache testoperator binary
      if: inputs.force_rebuild != 'true' && steps.minio-download.outputs.found != 'true'
      id: cache-testoperator
      uses: actions/cache@v4
      with:
        path: |
          target/release/testoperator${{ steps.detect-os.outputs.ext }}
        key: testoperator-${{ steps.detect-os.outputs.os }}-${{ steps.commit-sha.outputs.sha }}
        lookup-only: true

    - name: Setup Rust
      if: inputs.force_rebuild == 'true' || (steps.minio-download.outputs.found != 'true' && steps.cache-testoperator.outputs.cache-hit != 'true')
      uses: spiceai/spiceai/.github/actions/setup-rust@trunk
      with:
        os: ${{ steps.detect-os.outputs.os }}

    - name: Setup cc
      if: (inputs.force_rebuild == 'true' || (steps.minio-download.outputs.found != 'true' && steps.cache-testoperator.outputs.cache-hit != 'true')) && steps.detect-os.outputs.os == 'linux'
      uses: spiceai/spiceai/.github/actions/setup-cc@trunk

    - name: Build testoperator
      if: inputs.force_rebuild == 'true' || (steps.minio-download.outputs.found != 'true' && steps.cache-testoperator.outputs.cache-hit != 'true')
      shell: bash
      run: |
        cargo build -p testoperator --release --features models

    - name: Save to cache
      if: inputs.force_rebuild != 'true' && steps.minio-download.outputs.found != 'true' && steps.cache-testoperator.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          target/release/testoperator${{ steps.detect-os.outputs.ext }}
        key: testoperator-${{ steps.detect-os.outputs.os }}-${{ steps.commit-sha.outputs.sha }}

    - name: Upload testoperator to MinIO
      if: inputs.download_from_minio == 'true' && steps.minio-download.outputs.found != 'true' && (inputs.force_rebuild == 'true' || steps.cache-testoperator.outputs.cache-hit != 'true')
      shell: bash
      run: |
        mc cp target/release/testoperator${{ steps.detect-os.outputs.ext }} spice-minio/artifacts/testoperator/${{ steps.detect-os.outputs.os }}-x86_64/${{ steps.commit-sha.outputs.sha }}/testoperator${{ steps.detect-os.outputs.ext }}

    - name: Install testoperator to system path (Linux/macOS)
      if: inputs.install_to_system_path == 'true' && steps.detect-os.outputs.os != 'windows'
      shell: bash
      run: |
        sudo mkdir -p /usr/local/bin
        sudo cp target/release/testoperator${{ steps.detect-os.outputs.ext }} /usr/local/bin/testoperator
        sudo chmod +x /usr/local/bin/testoperator

    - name: Install testoperator to system path (Windows)
      if: inputs.install_to_system_path == 'true' && steps.detect-os.outputs.os == 'windows'
      shell: bash
      run: |
        mkdir -p /c/usr/local/bin
        copy target/release/testoperator.exe /c/usr/local/bin/testoperator.exe
        chmod +x /c/usr/local/bin/testoperator.exe

    - name: Set output path
      id: set-path
      shell: bash
      run: |
        if [ "${{ inputs.install_to_system_path }}" = "true" ]; then
          if [ "${{ steps.detect-os.outputs.os }}" = "windows" ]; then
            echo "path=/c/usr/local/bin/testoperator.exe" >> $GITHUB_OUTPUT
          else
            echo "path=/usr/local/bin/testoperator" >> $GITHUB_OUTPUT
          fi
        else
          echo "path=${{ github.workspace }}/target/release/testoperator${{ steps.detect-os.outputs.ext }}" >> $GITHUB_OUTPUT
        fi

    - name: Upload testoperator artifact
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: testoperator-${{ steps.detect-os.outputs.os }}
        path: target/release/testoperator${{ steps.detect-os.outputs.ext }}
        retention-days: 28
