name: 'Setup Nextest'
description: 'Installs cargo-nextest for running Rust tests'

runs:
  using: 'composite'
  steps:
    - name: Install Nextest (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p ${CARGO_HOME:-~/.cargo}/bin
        curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

    - name: Install Nextest (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p ${CARGO_HOME:-~/.cargo}/bin
        curl -LsSf https://get.nexte.st/latest/mac | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

    - name: Install Nextest (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { "$env:USERPROFILE\.cargo" }
        $cargoBin = Join-Path $cargoHome "bin"
        New-Item -ItemType Directory -Force -Path $cargoBin | Out-Null
        Invoke-WebRequest -Uri "https://get.nexte.st/latest/windows" -OutFile "$cargoBin\nextest.zip"
        Expand-Archive -Path "$cargoBin\nextest.zip" -DestinationPath $cargoBin -Force
        Remove-Item "$cargoBin\nextest.zip"
