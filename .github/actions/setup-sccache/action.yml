name: Setup sccache
description: 'composite action'

inputs:
  minio_endpoint:
    description: 'MinIO endpoint (used for Linux and self-hosted macOS)'
    required: false
    type: string

runs:
  using: 'composite'
  steps:
    - name: Set up sccache (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install wget -y
        wget -q https://github.com/mozilla/sccache/releases/download/v0.9.1/sccache-v0.9.1-x86_64-unknown-linux-musl.tar.gz
        tar -xzf sccache-v0.9.1-x86_64-unknown-linux-musl.tar.gz
        sudo mv sccache-v0.9.1-x86_64-unknown-linux-musl/sccache /usr/local/bin
        rm -rf ~/.config/sccache/config
        mkdir -p ~/.config/sccache
        cat <<EOF > ~/.config/sccache/config
        [cache.s3]
        bucket = "sccache"
        endpoint = "${{ inputs.minio_endpoint }}"
        use_ssl = false
        server_side_encryption = false
        no_credentials = false
        region = "us-east-1"
        EOF

    - name: Set up sccache (macOS - self-hosted only)
      if: runner.os == 'macOS' && inputs.minio_endpoint != ''
      shell: bash
      run: |
        # Only self-hosted macOS runners use sccache (with localhost MinIO)
        # GitHub-hosted macOS runners use actions cache instead

        # Verify sccache is installed
        if ! command -v sccache &> /dev/null; then
          echo "Error: sccache is not installed on this macOS runner"
          exit 1
        fi
        sccache --version

        rm -rf ~/.config/sccache/config
        mkdir -p ~/.config/sccache
        cat <<EOF > ~/.config/sccache/config
        [cache.s3]
        bucket = "sccache"
        endpoint = "http://localhost:9000"
        use_ssl = false
        server_side_encryption = false
        no_credentials = false
        region = "us-east-1"
        EOF

    - name: Set up sccache (Windows)
      if: runner.os == 'Windows' && inputs.minio_endpoint != ''
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        # Download and install sccache
        $sccacheVersion = "v0.9.1"
        $sccacheUrl = "https://github.com/mozilla/sccache/releases/download/$sccacheVersion/sccache-$sccacheVersion-x86_64-pc-windows-msvc.zip"
        $sccacheZip = "$env:TEMP\sccache.zip"
        $sccacheDir = "$env:USERPROFILE\sccache"

        Invoke-WebRequest -Uri $sccacheUrl -OutFile $sccacheZip
        Expand-Archive -Path $sccacheZip -DestinationPath $sccacheDir -Force
        $sccacheExtractedDir = Join-Path $sccacheDir "sccache-$sccacheVersion-x86_64-pc-windows-msvc"
        $sccacheExePath = Join-Path $sccacheExtractedDir "sccache.exe"
        if (-not (Test-Path $sccacheExePath)) {
          Write-Error "sccache.exe not found at expected path: $sccacheExePath"
          exit 1
        }
        $sccacheBinDir = Split-Path $sccacheExePath -Parent
        echo "$sccacheBinDir" >> $env:GITHUB_PATH

        # Configure sccache
        $configDir = "$env:APPDATA\Mozilla\sccache"
        New-Item -ItemType Directory -Force -Path $configDir | Out-Null
        $config = @"
        [cache.s3]
        bucket = "sccache"
        endpoint = "${{ inputs.minio_endpoint }}"
        use_ssl = false
        server_side_encryption = false
        no_credentials = false
        region = "us-east-1"
        "@
        $config | Out-File -FilePath "$configDir\config" -Encoding utf8
