name: Installs the make tool
description: 'composite action'
inputs:
  os:
    description: 'Operating system to install make for'
    default: 'linux' # 'linux', 'windows','macos'

runs:
  using: 'composite'
  steps:
    - name: Install make (Linux)
      if: inputs.os == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y make

    - name: Install make (Windows)
      if: inputs.os == 'windows'
      shell: pwsh
      run: |
        # use choco to install make
        if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          echo "C:\ProgramData\Chocolatey\bin" >> $env:GITHUB_PATH
        }
        choco install make -y

    - name: Install make (macOS)
      if: inputs.os == 'macos' && matrix.target.runner != 'spiceai-macos'
      shell: bash
      run: |
        # Check if make is already installed
        if ! command -v make &> /dev/null; then
          brew install make
        fi
