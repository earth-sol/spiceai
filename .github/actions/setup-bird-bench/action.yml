name: Setup Bird-Bench Data
description: Download bird-bench data and prepare queryset/spicepods
inputs:
  data_directory:
    description: path to load data and spicepods into
    required: true
    type: string
  queryset_name:
    description: name of the queryset to load
    required: true
    type: string
  use_evidence:
    description: whether to include evidence in the question
    required: false
    default: 'false'
    type: string

outputs:
  spicepod_dependency:
    description: 'Path to the spicepod dependency'
    value: ${{ steps.configure_bird_bench.outputs.spicepod_dependency || steps.configure_bird_bench_windows.outputs.spicepod_dependency }}

runs:
  using: composite
  steps:
    - name: Prepare file-based data directory (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        sudo rm -rf "${{ inputs.data_directory }}"
        sudo mkdir -p "${{ inputs.data_directory }}"
        sudo chown "$(whoami):$(id -gn)" -R "${{ inputs.data_directory }}"

    - name: Prepare file-based data directory (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $dataDir = "${{ inputs.data_directory }}"
        if (Test-Path $dataDir) { Remove-Item -Recurse -Force $dataDir }
        New-Item -ItemType Directory -Force -Path $dataDir | Out-Null

    # actions/checkout should not be used with composite actions. Would reset workspace/github repo state.
    - name: Clone bird-bench repo (no checkout action) (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail

        git clone \
          --depth 1 \
          --filter=blob:none \
          --sparse \
          https://github.com/spiceai/spice-bird-bench.git bird-bench

        cd bird-bench
        git sparse-checkout set dev_20240627

    - name: Clone bird-bench repo (no checkout action) (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        git clone `
          --depth 1 `
          --filter=blob:none `
          --sparse `
          https://github.com/spiceai/spice-bird-bench.git bird-bench

        cd bird-bench
        git sparse-checkout set dev_20240627

    - name: Configure Bird-Bench Data (Linux/macOS)
      id: configure_bird_bench
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail

        BIRD_BENCH_DIR="$GITHUB_WORKSPACE/bird-bench/dev_20240627"
        # Parse `bird-bench-small[<dataset>]` -> `<dataset>`
        BIRD_BENCH_DATASET="${{ inputs.queryset_name }}"
        BIRD_BENCH_DATASET="${BIRD_BENCH_DATASET#bird-bench-small[}"
        BIRD_BENCH_DATASET="${BIRD_BENCH_DATASET%]}"

        # Install jq if not available
        if ! command -v jq &> /dev/null; then
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y jq
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            if ! brew list jq &> /dev/null; then
              brew install jq
            fi
          fi
        fi

        sudo mkdir -p /opt/spiced/data
        sudo chown "$(whoami):$(id -gn)" /opt/spiced/data

        if [ "${{ inputs.use_evidence }}" = "true" ]; then
          jq -c --arg db "$BIRD_BENCH_DATASET" \
            '.[] | select(.db_id == $db) | { sql: .SQL, question: (.question + .evidence) }' "$BIRD_BENCH_DIR/dev.json" \
            > /opt/spiced/data/queryset.json
        else
          jq -c --arg db "$BIRD_BENCH_DATASET" \
            '.[] | select(.db_id == $db) | { sql: .SQL, question: .question }' "$BIRD_BENCH_DIR/dev.json" \
            > /opt/spiced/data/queryset.json
        fi

        mv "$BIRD_BENCH_DIR" "${{ inputs.data_directory }}"

        DATASET_SPICEPOD="${{ inputs.data_directory }}dev_20240627/spicepods/$BIRD_BENCH_DATASET/spicepod.yaml"
        if [ ! -f "$DATASET_SPICEPOD" ]; then
          echo "Error: Spicepod file not found at $DATASET_SPICEPOD"
          exit 1
        fi

        # sed -i syntax differs between Linux and macOS
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          sudo sed -i '' \
            's|from: file:\./dev_databases/|from: file:./data/dev_databases/|g' "$DATASET_SPICEPOD"
        else
          sudo sed -i \
            's|from: file:\./dev_databases/|from: file:./data/dev_databases/|g' "$DATASET_SPICEPOD"
        fi

        # Output DATASET_SPICEPOD from action
        echo "spicepod_dependency=$DATASET_SPICEPOD" >> "$GITHUB_OUTPUT"

    - name: Configure Bird-Bench Data (Windows)
      id: configure_bird_bench_windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $birdBenchDir = "$env:GITHUB_WORKSPACE\bird-bench\dev_20240627"
        # Parse `bird-bench-small[<dataset>]` -> `<dataset>`
        $birdBenchDataset = "${{ inputs.queryset_name }}"
        $birdBenchDataset = $birdBenchDataset -replace '^bird-bench-small\[', ''
        $birdBenchDataset = $birdBenchDataset -replace '\]$', ''

        # Install jq via choco if not available
        if (-not (Get-Command jq -ErrorAction SilentlyContinue)) {
          choco install jq -y
          refreshenv
        }

        $dataDir = "${{ inputs.data_directory }}"
        New-Item -ItemType Directory -Force -Path $dataDir | Out-Null

        $devJson = "$birdBenchDir\dev.json"
        if ("${{ inputs.use_evidence }}" -eq "true") {
          Get-Content $devJson | jq -c --arg db $birdBenchDataset '.[] | select(.db_id == $db) | { sql: .SQL, question: (.question + .evidence) }' | Set-Content -Path "$dataDir\queryset.json" -Encoding utf8
        } else {
          Get-Content $devJson | jq -c --arg db $birdBenchDataset '.[] | select(.db_id == $db) | { sql: .SQL, question: .question }' | Set-Content -Path "$dataDir\queryset.json" -Encoding utf8
        }

        $destinationDir = Join-Path "${{ inputs.data_directory }}" "dev_20240627"
        if (-not (Test-Path $destinationDir)) {
          Move-Item -Path $birdBenchDir -Destination "${{ inputs.data_directory }}"
        } else {
          Write-Host "Destination $destinationDir already exists. Skipping Move-Item."
        }

        $datasetSpicepod = Join-Path "${{ inputs.data_directory }}" "dev_20240627\spicepods\$birdBenchDataset\spicepod.yaml"
        if (-not (Test-Path $datasetSpicepod)) {
          Write-Host "Error: Spicepod file not found at $datasetSpicepod"
          exit 1
        }

        # Update path in spicepod
        (Get-Content $datasetSpicepod) -replace 'from: file:\./dev_databases/', 'from: file:./data/dev_databases/' | Set-Content $datasetSpicepod

        # Output DATASET_SPICEPOD from action
        echo "spicepod_dependency=$datasetSpicepod" >> $env:GITHUB_OUTPUT
