---
name: pr

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    branches:
      - trunk
      - release-*
      - release/*
      - feature-*
  workflow_dispatch:
    inputs:
      profile_option:
        description: "Which Rust build profile to use? (Default is lint)"
        required: false
        type: choice
        options:
          - "lint"
          - "release"
          - "release-lto"
        default: "lint"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'trunk' && github.sha || 'any-sha' }}
  cancel-in-progress: true

env:
  IGNORED_PATHS: '(^./docs/|^README.md$|^version.txt$|^acknowledgements.md$)'
  RUST_PROFILE: ${{ github.event.inputs.profile_option || 'lint' }}

jobs:
  # `pr` is a required check for pull requests. Therefore we cannot skip the workflow via
  # `on.pull_requests.paths-ignore`. Instead, we conditionally run the jobs (which report
  # a sucess when skipped).
  check_changes:
    runs-on: spiceai-dev-runners
    outputs:
      relevant_changes: ${{ steps.check_changes.outputs.relevant_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect all code changes
        id: changed-code-files
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code_changes:
              - 'crates/**'
              - 'bin/**'
              - 'test/**'
              - 'tools/**'
              - 'install/**'
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'go.mod'
              - 'go.sum'

      - name: Check for relevant changes
        id: check_changes
        run: |
          echo "relevant_changes=${{ steps.changed-code-files.outputs.code_changes }}" >> $GITHUB_OUTPUT

  lint:
    name: Run Go & Rust Linters
    runs-on: spiceai-dev-runners
    env:
      GOVER: 1.24.2
    needs: check_changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: needs.check_changes.outputs.relevant_changes == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVER }}
          cache: false

      - name: Install golangci-lint
        if: needs.check_changes.outputs.relevant_changes == 'true'
        run: |
          if ! command -v golangci-lint &> /dev/null ; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
          fi

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        if: needs.check_changes.outputs.relevant_changes == 'true'
        with:
          os: 'linux'
      
      - name: Check if sccache can be set up
        run: |
          if [ -z "${{ secrets.TEST_MINIO_ENDPOINT }}" ]; then
            echo "SCCACHE_SETUP=false" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
          else
            echo "SCCACHE_SETUP=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          fi

      - name: Set up sccache
        if: ${{ needs.check_changes.outputs.relevant_changes == 'true' &&  env.SCCACHE_SETUP == 'true' }}
        uses: ./.github/actions/setup-sccache
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          os: 'linux'

      - name: Install Protoc
        if: needs.check_changes.outputs.relevant_changes == 'true'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up make
        uses: ./.github/actions/setup-make

      - name: Set up cc
        uses: ./.github/actions/setup-cc

      - run: make lint
        if: needs.check_changes.outputs.relevant_changes == 'true'
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_MINIO_SECRET_KEY }}
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          RUST_PROFILE: ${{ env.RUST_PROFILE }}

      - name: Show sccache stats
        if: ${{ needs.check_changes.outputs.relevant_changes == 'true' && env.SCCACHE_SETUP == 'true' }}
        run: sccache --show-stats

      - name: Check if Cargo.lock is updated
        if: needs.check_changes.outputs.relevant_changes == 'true'
        run: |
          if git diff --exit-code Cargo.lock; then
            echo "Cargo.lock is up to date"
          else
            echo "Update Cargo.lock"
            exit 1
          fi

  build:
    name: Build Go & Rust
    runs-on: spiceai-dev-runners
    env:
      GOVER: 1.24.2
    needs: check_changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVER }}
          cache: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          os: 'linux'
        
      - name: Install Nextest
        if: needs.check_changes.outputs.relevant_changes == 'true'
        run: |
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Check if sccache can be set up
        run: |
          if [ -z "${{ secrets.TEST_MINIO_ENDPOINT }}" ]; then
            echo "SCCACHE_SETUP=false" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
          else
            echo "SCCACHE_SETUP=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          fi

      - name: Set up sccache
        if: ${{ needs.check_changes.outputs.relevant_changes == 'true' && env.SCCACHE_SETUP == 'true' }}
        uses: ./.github/actions/setup-sccache
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          os: 'linux'

      - name: Set up make
        uses: ./.github/actions/setup-make

      - name: Set up cc
        uses: ./.github/actions/setup-cc

      - run: make build-cli nextest
        if: needs.check_changes.outputs.relevant_changes == 'true'
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_MINIO_SECRET_KEY }}
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          RUST_PROFILE: ${{ env.RUST_PROFILE }}

      - name: Show sccache stats
        if: ${{ needs.check_changes.outputs.relevant_changes == 'true' && env.SCCACHE_SETUP == 'true' }}
        run: sccache --show-stats

  build-docker:
    name: Build Docker Image
    runs-on: spiceai-dev-runners
    needs: check_changes

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        if: needs.check_changes.outputs.relevant_changes == 'true'
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            CARGO_FEATURES=odbc
            RUST_PROFILE=${{ env.RUST_PROFILE }}
          tags: |
            ghcr.io/spiceai/spiceai-rust:ci
