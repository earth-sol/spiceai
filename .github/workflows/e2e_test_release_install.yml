name: E2E Test Release Installation

on:
  workflow_dispatch:
    inputs:
      install_script_branch:
        description: 'Branch to use for install script (leave empty to use install.spiceai.org)'
        required: false
        type: string
        default: ''
  pull_request:
    paths:
      - 'install/install.sh'
      - 'install/Install.ps1'
      - '.github/workflows/e2e_test_release_install.yml'
  push:
    branches:
      - trunk
    paths:
      - 'install/install.sh'
      - 'install/Install.ps1'
      - '.github/workflows/e2e_test_release_install.yml'

jobs:
  test-install:
    name: install on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: spiceai-dev-runners
            target_os: linux
            target_arch: x86_64
          - name: Linux aarch64
            runner: hosted-linux-arm-runner
            target_os: linux
            target_arch: aarch64
          - name: macOS aarch64 (Apple Silicon)
            runner: macos-15
            target_os: darwin
            target_arch: aarch64
          # Windows runtime is not supported - use WSL

    steps:
      - name: system info
        run: uname -m

      - name: checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      # The aarch64 runner does not have any tools pre-installed
      - name: Install missing tools
        if: matrix.target_os == 'linux' && matrix.target_arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt install jq -y

      - name: install Spice (https://install.spiceai.org)
        if: github.event_name == 'workflow_dispatch' && inputs.install_script_branch == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl https://install.spiceai.org | /bin/bash

      - name: install Spice (from branch)
        if: github.event_name != 'workflow_dispatch' || inputs.install_script_branch != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ inputs.install_script_branch || github.head_ref || github.ref_name }}"
          curl -sSL -H "Cache-Control: no-cache" "https://raw.githubusercontent.com/spiceai/spiceai/${BRANCH}/install/install.sh" | /bin/bash

      - name: add Spice bin to PATH
        run: |
          echo "$HOME/.spice/bin" >> $GITHUB_PATH

      - name: check installation
        run: |
          spice version

      - name: start Spice runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          spice init app
          cd app
          spice run &

      - name: wait for Spice runtime healthy
        run: |
          bash -c 'while [[ "$(curl -s http://localhost:8090/health)" != "ok" ]]; do sleep 1; done' || false
        timeout-minutes: 1

      - name: check Spice cli and runtime version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(spice version 2>&1)
          cli_version=$(echo "$version" | grep 'CLI version:' | cut -d':' -f2 | xargs)
          runtime_version=$(echo "$version" | grep 'Runtime version:' | cut -d':' -f2 | xargs)

          release_version="$(curl -s "https://api.github.com/repos/spiceai/spiceai/releases/latest" -H "Authorization: token $GITHUB_TOKEN" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')+models"

          echo "Release Version: $release_version"
          echo "CLI Version: $cli_version"
          echo "Runtime Version: $runtime_version"

          # Release version contains '+models' suffix, so we need to add it to the cli_version for comparison
          if [ "$cli_version+models" != "$release_version" ]; then
            echo "CLI version $cli_version does not match the latest release version $release_version."
            exit 1
          fi

          if [ "$runtime_version" != "$release_version" ]; then
            echo "Runtime version $runtime_version does not match the latest release version $release_version."
            exit 1
          fi

  # Test Windows with WSL - runtime runs in WSL, not native Windows
  test-install-windows-wsl:
    name: install on Windows x64 (WSL)
    runs-on: windows-latest
    steps:
      - name: checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Setup WSL
        uses: Vampire/setup-wsl@6a8db447be7ed35f2f499c02c6e60ff77ef11278 # v6.0.0
        with:
          distribution: Ubuntu-22.04
          additional-packages: curl jq

      - name: install Spice (https://install.spiceai.org)
        if: github.event_name == 'workflow_dispatch' && inputs.install_script_branch == ''
        shell: wsl-bash {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl https://install.spiceai.org | /bin/bash

      - name: install Spice (from branch)
        if: github.event_name != 'workflow_dispatch' || inputs.install_script_branch != ''
        shell: wsl-bash {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ inputs.install_script_branch || github.head_ref || github.ref_name }}"
          curl -sSL -H "Cache-Control: no-cache" "https://raw.githubusercontent.com/spiceai/spiceai/${BRANCH}/install/install.sh" | /bin/bash

      - name: check installation
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.spice/bin:$PATH"
          spice version

      - name: start Spice runtime and wait for healthy
        shell: wsl-bash {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.spice/bin:$PATH"
          spice init app
          cd app
          spice run &
          # Wait for the runtime to be healthy
          for i in $(seq 1 60); do
            if [ "$(curl -s http://localhost:8090/health)" = "ok" ]; then
              echo "Spice runtime is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "Spice runtime failed to start"
          exit 1
        timeout-minutes: 2

      - name: check Spice cli and runtime version
        shell: wsl-bash {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.spice/bin:$PATH"
          version=$(spice version 2>&1)
          cli_version=$(echo "$version" | grep 'CLI version:' | cut -d':' -f2 | xargs)
          runtime_version=$(echo "$version" | grep 'Runtime version:' | cut -d':' -f2 | xargs)

          # Use bash array for optional curl args to avoid quoting issues
          auth_args=()
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: token $GITHUB_TOKEN")
          fi
          release_version="$(curl -s "https://api.github.com/repos/spiceai/spiceai/releases/latest" "${auth_args[@]}" | jq -r '.tag_name')+models"

          echo "Release Version: $release_version"
          echo "CLI Version: $cli_version"
          echo "Runtime Version: $runtime_version"

          # Release version contains '+models' suffix, so we need to add it to the cli_version for comparison
          if [ "$cli_version+models" != "$release_version" ]; then
            echo "CLI version $cli_version does not match the latest release version $release_version."
            exit 1
          fi

          if [ "$runtime_version" != "$release_version" ]; then
            echo "Runtime version $runtime_version does not match the latest release version $release_version."
            exit 1
          fi
