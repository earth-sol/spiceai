name: load tests
run-name: load - ${{ github.event.inputs.query_set }} - ${{ github.event.inputs.spicepod_path }}

on:
  workflow_dispatch:
    inputs:
      spiced_commit:
        description: 'spiced build commit'
        required: false
        type: string
      duration:
        description: 'The test duration in seconds'
        required: true
        default: '28800'
        type: string
      spicepod_path:
        description: 'The spicepod file to test with'
        required: true
        type: string
      query_set:
        description: 'Query set'
        required: true
        default: 'tpch'
        type: choice
        options:
          - 'tpch'
          - 'tpch[parameterized]'
          - 'tpcds'
          - 'clickbench'
      query_overrides:
        description: 'Query overrides'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - 'sqlite'
          - 'postgresql'
          - 'mysql'
          - 'dremio'
          - 'odbc-athena'
          - 'odbc-databricks'
          - 'duckdb'
          - 'duckdb-zero-results'
          - 'duckdb-partitioned'
          - 'snowflake'
          - 'spark'
          - 'iceberg-sf1'
          - 'spicecloud-catalog'
          - 'glue-catalog'
          - 'databricks-catalog'
          - 'spicecloud'
          - 'iceberg-hadoop'
      runner_type:
        description: 'Runner type'
        required: true
        default: 'spiceai-dev-runners'
        type: choice
        options:
          - 'spiceai-dev-runners'
          - 'spiceai-dev-large-runners'
      concurrency:
        description: 'How many concurrent client connections to use?'
        required: true
        default: '8'
        type: string
      random_param_set_count:
        description: 'Number of random parameter sets to generate for parameterized queries (optional)'
        required: false
        type: string
      http_clients:
        description: 'Use HTTP clients for the test?'
        required: false
        type: boolean
        default: false
      scrape_spiced_metrics:
        description: 'Scrape Prometheus metrics from spiced during the test'
        required: false
        type: boolean
        default: false

jobs:
  run-load:
    name: Run load test
    runs-on: ${{ github.event.inputs.runner_type }}
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set spicepod path
        id: set_spicepod_path
        run: |
          query_set="${{ github.event.inputs.query_set }}"
          query_set="${query_set%%\[*\]*}"
          SPICEPOD_PATH="./test/spicepods/${query_set}/sf1/${{ github.event.inputs.spicepod_path }}"
          echo "SPICEPOD_PATH=${SPICEPOD_PATH}" >> $GITHUB_OUTPUT

      - name: Validate spicepod file exists
        run: |
          if [ ! -f "${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }}" ]; then
            echo "Error: Spicepod file not found at ${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }}"
            exit 1
          fi
          echo "Spicepod file found at ${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }}"

      - name: Install MinIO
        uses: ./.github/actions/setup-minio
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          minio_access_key: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.TEST_MINIO_SECRET_KEY }}

      - name: Build spicepod validator
        uses: ./.github/actions/build-spicepod-validator
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          minio_access_key: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.TEST_MINIO_SECRET_KEY }}

      - name: Validate spicepod
        run: |
          spicepod-validator "${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }}"

      - name: Setup spiced
        uses: ./.github/actions/setup-spiced
        with:
          spiced_commit: ${{ github.event.inputs.spiced_commit }}

      - name: Build Testoperator
        uses: ./.github/actions/build-testoperator
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          minio_access_key: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.TEST_MINIO_SECRET_KEY }}

      - name: Setup Testoperator
        uses: ./.github/actions/setup-testoperator-data
        with:
          query_set: ${{ github.event.inputs.query_set }}

      - name: Setup MySQL
        run: |
          if [[ ${{ github.event.inputs.query_set }} == "tpcds" ]]; then
            echo "MYSQL_DB=tpcds_sf1" >> $GITHUB_ENV
          elif [[ ${{ github.event.inputs.query_set }} == "tpch" ]]; then
            echo "MYSQL_DB=tpch_sf1" >> $GITHUB_ENV
          fi

      - name: Install OpenMP runtime library
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Run the load test - ${{ github.event.inputs.spicepod_path }}
        if: ${{ github.event.inputs.query_overrides == '' }}
        run: |
          rm -rf .spice/data
          testoperator run load \
            -s /usr/local/bin/spiced \
            -p ${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --ready-wait 900 \
            --disable-progress-bars \
            --duration ${{ github.event.inputs.duration }} \
            --concurrency ${{ github.event.inputs.concurrency }} \
            ${{ github.event.inputs.random_param_set_count && format('--random-param-set-count {0}', github.event.inputs.random_param_set_count) || '' }} \
            ${{ github.event.inputs.http_clients == 'true' && '--http-clients' || '' }} \
            ${{ github.event.inputs.scrape_spiced_metrics == 'true' && '--scrape-spiced-metrics' || '' }} \
            --metrics
        env:
          S3_ENDPOINT: ${{ secrets.TEST_MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.TEST_MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.TEST_MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.TEST_MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TEST_ENDPOINT: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_ENDPOINT }}
          SPICEAI_TEST_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCH_BENCHMARK_KEY }}
          SPICEAI_TEST_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          SQL_WAREHOUSE_DATABRICKS_TOKEN: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_TOKEN }}
          SQL_WAREHOUSE_DATABRICKS_HOST: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_HOST }}
          SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}
          MONGODB_HOST: ${{ secrets.TEST_MONGODB_HOST }}
          MONGODB_PASSWORD: ${{ secrets.TEST_MONGODB_PASSWORD }}
          SPICEAI_BENCHMARK_METRICS_KEY: ${{ secrets.SPICEAI_BENCHMARK_METRICS_KEY }}

      - name: Run the load test (with overrides) - ${{ github.event.inputs.spicepod_path }}
        if: ${{ github.event.inputs.query_overrides != '' }}
        run: |
          rm -rf .spice/data
          testoperator run load \
            -s /usr/local/bin/spiced \
            -p ${{ steps.set_spicepod_path.outputs.SPICEPOD_PATH }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --ready-wait 900 \
            --disable-progress-bars \
            --duration ${{ github.event.inputs.duration }} \
            --query-overrides ${{ github.event.inputs.query_overrides }} \
            --concurrency ${{ github.event.inputs.concurrency }} \
            ${{ github.event.inputs.random_param_set_count && format('--random-param-set-count {0}', github.event.inputs.random_param_set_count) || '' }} \
            ${{ github.event.inputs.http_clients == 'true' && '--http-clients' || '' }} \
            ${{ github.event.inputs.scrape_spiced_metrics == 'true' && '--scrape-spiced-metrics' || '' }} \
            --metrics
        env:
          S3_ENDPOINT: ${{ secrets.TEST_MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.TEST_MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.TEST_MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.TEST_MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TEST_ENDPOINT: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_ENDPOINT }}
          SPICEAI_TEST_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCH_BENCHMARK_KEY }}
          SPICEAI_TEST_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          SQL_WAREHOUSE_DATABRICKS_TOKEN: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_TOKEN }}
          SQL_WAREHOUSE_DATABRICKS_HOST: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_HOST }}
          SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}
          MONGODB_HOST: ${{ secrets.TEST_MONGODB_HOST }}
          MONGODB_PASSWORD: ${{ secrets.TEST_MONGODB_PASSWORD }}
          SPICEAI_BENCHMARK_METRICS_KEY: ${{ secrets.SPICEAI_BENCHMARK_METRICS_KEY }}