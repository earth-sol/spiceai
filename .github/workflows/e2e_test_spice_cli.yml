name: E2E Test CLI behavior
on:
  workflow_dispatch:
    inputs:
      build_cli:
        description: 'Build the CLI instead of using the specified release version'
        required: false
        default: 'true'
      rel_version:
        description: 'The version to build CLI / download released CLI'
        required: false
        default: '1.0.2'

jobs:
  setup-matrix:
    name: Setup strategy matrix
    runs-on: spiceai-dev-runners
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.result }}

    steps:
      - name: Set up matrix
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        id: setup-matrix
        with:
          script: |
            const matrix = [
              {
                name: "Linux x64",
                runner: "spiceai-dev-runners",
                target_os: "linux",
                target_arch: "x86_64",
                target_arch_go: "amd64",
              }, {
                name: "macOS aarch64 (Apple Silicon)",
                runner: "macos-15",
                target_os: "darwin",
                target_arch: "aarch64",
                target_arch_go: "arm64",
              }, {
                name: "Windows x64",
                runner: "windows-latest",
                target_os: "windows",
                target_arch: "x86_64",
                target_arch_go: "amd64",
              }
            ];
            return matrix;

  build:
    name: Build ${{ matrix.target.name }} CLI
    runs-on: ${{ matrix.target.runner }}
    needs: setup-matrix
    env:
      GOVER: 1.25.3
      GOOS: ${{ matrix.target.target_os }}
      GOARCH: ${{ matrix.target.target_arch_go }}
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
    strategy:
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        if: github.event.inputs.build_cli == 'true'

      - name: Set up Go
        if: github.event.inputs.build_cli == 'true'
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
        with:
          go-version: ${{ env.GOVER }}
          cache: false

      - name: Set up make
        if: matrix.target.target_os == 'linux' && github.event.inputs.build_cli == 'true'
        uses: ./.github/actions/setup-make

      - name: Build spice
        if: github.event.inputs.build_cli == 'true'
        run: make -C bin/spice

      - name: Make spice executable & Move spice (Unix)
        if: matrix.target.target_os != 'windows' && github.event.inputs.build_cli == 'true'
        run: |
          mv target/release/spice spice
          chmod +x spice

      - name: Move Spice(Windows)
        if: matrix.target.target_os == 'windows' && github.event.inputs.build_cli == 'true'
        shell: pwsh
        run: |
          Move-Item -Path target/release/spice.exe -Destination spice.exe -Force

      - name: Save spice artifact
        if: matrix.target.target_os != 'windows' && github.event.inputs.build_cli == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v5
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: |
            spice

      - name: Save spice artifact
        if: matrix.target.target_os == 'windows' && github.event.inputs.build_cli == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v5
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: |
            spice.exe

  test_spice_upgrade_with_runtime:
    name: 'Test spice upgrade (${{ matrix.target.target_os }}-${{ matrix.target.target_arch }})'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
      - setup-matrix
    timeout-minutes: 5

    strategy:
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os != 'windows'
        run: |
          mkdir -p ./build
          cd ./build
          url="https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}.tar.gz"
          output="spice.tar.gz"
          curl -L -o "$output" "$url"
          tar -xzf "$output"
          rm "$output"
          chmod +x spice

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "./build" > $null
          Set-Location "./build"
          $url = "https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice.exe_windows_x86_64.tar.gz"
          $output = "spice.exe_windows_x86_64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $output
          tar -xzf $output
          Remove-Item $output

      - name: Download a older spiced
        shell: pwsh
        if: matrix.target.target_os == 'windows'
        run: |
          Set-Location "./build"
          $url = "https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spiced.exe_windows_x86_64.tar.gz"
          $output = "spiced.exe_windows_x86_64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $output
          tar -xzf $output
          Remove-Item $output

      - name: Download older spiced
        if: matrix.target.target_os != 'windows'
        run: |
          cd ./build
          url="https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spiced_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}.tar.gz"
          output="spiced.tar.gz"
          curl -L -o "$output" "$url"
          tar -xzf "$output"
          rm "$output"
          chmod +x spiced

      - name: Install spice
        uses: ./.github/actions/install-spice
        with:
          build-path: ./build

      - name: Run spice upgrade
        run: |
          spice upgrade

      - name: Check the temp directory (Windows)
        if: matrix.target.target_os == 'windows'
        run: |
          Write-Host "System temp directory: $env:TEMP"
          Get-ChildItem -Path $env:TEMP -Recurse |
              Where-Object { $_.Name -like "spice*" } |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize

      - name: Run spice upgrade again
        if: matrix.target.target_os == 'windows'
        run: |
          spice upgrade

      - name: Check the temp directory (Windows)
        if: matrix.target.target_os == 'windows'
        run: |
          Write-Host "System temp directory: $env:TEMP"
          Get-ChildItem -Path $env:TEMP -Recurse |
              Where-Object { $_.Name -like "spice*" } |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize

  test_spice_upgrade_without_runtime:
    name: 'Test spice upgrade without runtime (${{ matrix.target.target_os }}-${{ matrix.target.target_arch }})'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
      - setup-matrix
    timeout-minutes: 5

    strategy:
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os != 'windows'
        run: |
          mkdir -p ./build
          cd ./build
          url="https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}.tar.gz"
          output="spice.tar.gz"
          curl -L -o "$output" "$url"
          tar -xzf "$output"
          rm "$output"
          chmod +x spice

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "./build" > $null
          Set-Location "./build"
          $url = "https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice.exe_windows_x86_64.tar.gz"
          $output = "spice.exe_windows_x86_64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $output
          tar -xzf $output
          Remove-Item $output

      - name: Install Spice CLI
        uses: ./.github/actions/install-spice-cli
        with:
          build-path: ./build

      - name: Run spice upgrade
        run: |
          spice upgrade

      - name: Check the temp directory (Windows)
        if: matrix.target.target_os == 'windows'
        run: |
          Write-Host "System temp directory: $env:TEMP"
          Get-ChildItem -Path $env:TEMP -Recurse |
              Where-Object { $_.Name -like "spice*" } |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize

      - name: Run spice upgrade again
        if: matrix.target.target_os == 'windows'
        run: |
          spice upgrade

      - name: Check the temp directory (Windows)
        if: matrix.target.target_os == 'windows'
        run: |
          Write-Host "System temp directory: $env:TEMP"
          Get-ChildItem -Path $env:TEMP -Recurse |
              Where-Object { $_.Name -like "spice*" } |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize

  test_spice_install_without_runtime:
    name: 'Test spice install without runtime (${{ matrix.target.target_os }}-${{ matrix.target.target_arch }})'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
      - setup-matrix
    timeout-minutes: 5

    strategy:
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os != 'windows'
        run: |
          mkdir -p ./build
          cd ./build
          url="https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}.tar.gz"
          output="spice.tar.gz"
          curl -L -o "$output" "$url"
          tar -xzf "$output"
          rm "$output"
          chmod +x spice

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "./build" > $null
          Set-Location "./build"
          $url = "https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice.exe_windows_x86_64.tar.gz"
          $output = "spice.exe_windows_x86_64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $output
          tar -xzf $output
          Remove-Item $output

      - name: Install Spice CLI
        uses: ./.github/actions/install-spice-cli
        with:
          build-path: ./build

      - name: Run spice install
        run: |
          spice install

      - name: Run spice version
        run: |
          spice version

  test_spice_run_without_runtime:
    name: 'Test spice run without runtime (${{ matrix.target.target_os }}-${{ matrix.target.target_arch }})'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
      - setup-matrix
    timeout-minutes: 5

    strategy:
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os != 'windows'
        run: |
          mkdir -p ./build
          cd ./build
          url="https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}.tar.gz"
          output="spice.tar.gz"
          curl -L -o "$output" "$url"
          tar -xzf "$output"
          rm "$output"
          chmod +x spice

      - name: download spice cli released version
        if: github.event.inputs.build_cli == 'false' && matrix.target.target_os == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "./build" > $null
          Set-Location "./build"
          $url = "https://github.com/spiceai/spiceai/releases/download/v${{ env.REL_VERSION }}/spice.exe_windows_x86_64.tar.gz"
          $output = "spice.exe_windows_x86_64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $output
          tar -xzf $output
          Remove-Item $output

      - name: Install Spice CLI
        uses: ./.github/actions/install-spice-cli
        with:
          build-path: ./build

      - name: Start spice runtime
        if: matrix.target.target_os != 'windows'
        run: |
          spice run &> spice.log &
          # time to download runtime
          sleep 60

      - name: Start spice runtime
        if: matrix.target.target_os == 'windows'
        run: |
          Start-Process spice -ArgumentList "run" -NoNewWindow -RedirectStandardOutput "spice.stdout.log" -RedirectStandardError "spice.stderr.log"
          # time to download runtime
          Start-Sleep -Seconds 60

      - name: Stop spice and check logs
        if: always() && matrix.target.target_os != 'windows'
        run: |
          killall spice || true
          cat spice.log

      - name: Stop spice and check logs
        if: always() && matrix.target.target_os == 'windows'
        shell: pwsh
        run: |
          Get-Process -Name spice -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Content spice.stdout.log, spice.stderr.log

      - name: Run spice version
        run: |
          spice version

  test_spice_upgrade_from_brew:
    name: 'Test spice upgrade from a homebrew spice cli'
    if: github.event.inputs.build_cli == 'true'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
    timeout-minutes: 5

    strategy:
      matrix:
        target:
          - name: 'macOS aarch64 (Apple Silicon)'
            runner: 'macos-15'
            target_os: 'darwin'
            target_arch: 'aarch64'
            target_arch_go: 'arm64'

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: download spice cli from homebrew
        run: |
          brew install spiceai/spiceai/spice
          spice version
          which spice

      - name: move the built spice cli to brew directory
        run: |
          sudo mv ./build/spice /opt/homebrew/bin
          sudo chmod +x /opt/homebrew/bin/spice
          which spice
          spice version

      - name: run spice upgrade
        run: |
          spice upgrade

  test_spice_chat:
    name: 'Test spice chat'
    if: github.event.inputs.build_cli == 'true'
    continue-on-error: true
    runs-on: ${{ matrix.target.runner }}
    env:
      REL_VERSION: ${{ github.event.inputs.rel_version || '1.0.2' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - build
    timeout-minutes: 5

    strategy:
      matrix:
        target:
          - name: 'macOS aarch64 (Apple Silicon)'
            runner: 'macos-15'
            target_os: 'darwin'
            target_arch: 'aarch64'
            target_arch_go: 'arm64'

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: download artifacts - build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
        if: github.event.inputs.build_cli != 'false'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: build_${{ matrix.target.target_os }}_${{ matrix.target.target_arch }}
          path: ./build

      - name: Install spice
        uses: ./.github/actions/install-spice-cli
        with:
          build-path: ./build

      - name: Init spice app
        run: |
          cp ./test/cli/spicepod_openai.yml ./spicepod.yaml
          cat ./spicepod.yaml

      - name: Start spice runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPICE_OPENAI_API_KEY: ${{ secrets.SPICE_SECRET_OPENAI_API_KEY }}
        run: |
          spice run &> spice.log &

      - name: Wait for Spice runtime is ready
        timeout-minutes: 1
        run: |
          while [[ "$(curl -s http://localhost:8090/v1/ready)" != "ready" ]]; do sleep 1; done

      - name: Install expect (macOS)
        if: matrix.target.target_os == 'darwin'
        run: |
          brew install expect

      - name: Make expect scripts executable
        run: |
          chmod +x ./test/cli/*.exp

      - name: Test `spice chat` error
        run: |
          expect ./test/cli/spice_chat_error.exp

      - name: Test `spice chat <message>`
        run: |
          expect ./test/cli/spice_chat_message.exp

      - name: Stop spice and check logs
        if: always()
        run: |
          killall spice || true
          cat spice.log
