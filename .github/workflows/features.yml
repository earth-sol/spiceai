name: check all features

on:
  push:
    branches:
      - trunk
    paths:
      - '**/Cargo.toml'
  pull_request:
    paths:
      - '**/Cargo.toml'
  workflow_dispatch:

concurrency:
  # Allow only one workflow per any non-trunk branch.
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'trunk' && github.sha || 'any-sha' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build:
    name: Features Check
    runs-on: spiceai-dev-runners

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          os: 'linux'

      - name: Set up make
        uses: ./.github/actions/setup-make

      - name: Set up cc
        uses: ./.github/actions/setup-cc

      - name: Check if sccache can be set up
        run: |
          if [ -z "${{ secrets.TEST_MINIO_ENDPOINT }}" ]; then
            echo "SCCACHE_SETUP=false" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
          else
            echo "SCCACHE_SETUP=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          fi

      - name: Set up sccache
        if: ${{ env.SCCACHE_SETUP == 'true' }}
        uses: ./.github/actions/setup-sccache
        with:
          minio_endpoint: ${{ secrets.TEST_MINIO_ENDPOINT }}
          os: 'linux'

      # Putting this into a GitHub Actions matrix will run a separate job per matrix item, whereas in theory
      # this can re-use the existing build cache to go faster.
      - name: Build without default features
        run: cargo check --no-default-features
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_MINIO_SECRET_KEY }}
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Build with only duckdb
        run: cargo check --no-default-features --features duckdb
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_MINIO_SECRET_KEY }}
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Build with only postgres
        run: cargo check --no-default-features --features postgres
        env:
          RUSTC_WRAPPER: ${{ env.RUSTC_WRAPPER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_MINIO_SECRET_KEY }}
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Build with only sqlite
