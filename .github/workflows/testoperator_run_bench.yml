name: benchmark e2e tests

on:
  workflow_dispatch:
    inputs:
      spiced_commit:
        description: 'spiced build commit'
        required: false
        type: string
      spicepod_path:
        description: 'The spicepod file to test with'
        required: true
        type: string
      query_set:
        description: 'Query set'
        required: true
        default: 'tpch'
        type: choice
        options:
          - 'tpch'
          - 'tpch[parameterized]'
          - 'tpcds'
          - 'clickbench'
      query_overrides:
        description: 'Query overrides'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - 'sqlite'
          - 'postgresql'
          - 'mysql'
          - 'dremio'
          - 'odbc-athena'
          - 'odbc-databricks'
          - 'duckdb'
          - 'duckdb-zero-results'
          - 'snowflake'
          - 'spark'
          - 'iceberg-sf1'
          - 'spicecloud-catalog'
          - 'spicecloud'
      ready_wait:
        description: 'How long (in seconds) to wait for spiced to start'
        required: true
        default: '30'
        type: string
      runner_type:
        description: 'Runner type'
        required: true
        default: 'spiceai-runners'
        type: choice
        options:
          - 'spiceai-runners'
          - 'spiceai-large-runners'
      scale_factor:
        description: 'Scale factor for the benchmark'
        required: false
        type: string
        default: '1'
      update_snapshots:
        description: 'Update the snapshots?'
        required: false
        default: 'no'
        type: choice
        options:
          - 'always'
          - 'no'
      validate_results:
        description: 'Validate the results?'
        required: false
        type: boolean
        default: false

jobs:
  run-bench:
    name: Run benchmark e2e tests
    runs-on: ${{ github.event.inputs.runner_type }}
    timeout-minutes: 600
    services:
      mssql_tpch:
        image: ${{ contains(github.event.inputs.spicepod_path, 'mssql') && 'ghcr.io/spiceai/spice-mssql-bench:latest' || '' }}
        ports:
          - 1433:1433
        env:
          MSSQL_SA_PASSWORD: S3cretP@ssw0rd
          DB_NAME: tpch_sf1
    steps:
      - uses: actions/checkout@v4

      - name: Extract spicepod filename path
        id: extract_spicepod_filename
        run: |
          SPICEPOD_PATH="${{ github.event.inputs.spicepod_path }}"
          SPICEPOD_FILENAME=$(basename $SPICEPOD_PATH)
          echo "SPICEPOD_FILENAME=${SPICEPOD_FILENAME}" >> $GITHUB_OUTPUT

      - name: Install MinIO
        uses: ./.github/actions/setup-minio
        with:
          minio_endpoint: ${{ secrets.MINIO_ENDPOINT }}
          minio_access_key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Setup spiced
        uses: ./.github/actions/setup-spiced
        id: setup-spiced
        with:
          spiced_commit: ${{ github.event.inputs.spiced_commit }}
          with_odbc: ${{ contains(steps.extract_spicepod_filename.outputs.SPICEPOD_FILENAME, 'odbc') }}

      - name: Display spiced commit
        run: echo "SPICED_COMMIT=${{ steps.setup-spiced.outputs.SPICED_COMMIT }}"

      - name: Build Testoperator
        uses: ./.github/actions/build-testoperator

      - name: Setup Testoperator
        uses: ./.github/actions/setup-testoperator-data
        with:
          query_set: ${{ github.event.inputs.query_set }}

      - name: Setup MySQL
        run: |
          if [[ ${{ github.event.inputs.query_set }} == "tpcds" ]]; then
            echo "MYSQL_DB=tpcds_sf1" >> $GITHUB_ENV
          elif [[ ${{ github.event.inputs.query_set }} == "tpch" ]]; then
            echo "MYSQL_DB=tpch_sf1" >> $GITHUB_ENV
            echo "MYSQL_DB_SF100=tpch_sf100" >> $GITHUB_ENV
          fi

      - name: Setup ODBC
        if: ${{ contains(steps.extract_spicepod_filename.outputs.SPICEPOD_FILENAME, 'odbc') }}
        uses: ./.github/actions/setup-odbc

      - name: Run the benchmark test - ${{ steps.extract_spicepod_filename.outputs.SPICEPOD_FILENAME }}
        if: ${{ github.event.inputs.query_overrides == '' }}
        run: |
          rm -rf .spice/data
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" testoperator run bench \
            -s /usr/local/bin/spiced \
            -p ${{ github.event.inputs.spicepod_path }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --ready-wait ${{ github.event.inputs.ready_wait }} \
            --disable-progress-bars \
            --validate=${{ github.event.inputs.validate_results }} \
            --metrics \
            --scale-factor ${{ github.event.inputs.scale_factor }}
        env:
          S3_ENDPOINT: ${{ secrets.MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_ODBC_PATH: ${{ secrets.DATABRICKS_ODBC_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ATHENA_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_ATHENA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_RW_HOST: ${{ secrets.POSTGRES_RW_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TPCH_BENCHMARK_KEY }}
          SPICEAI_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}
          INSTA_UPDATE: ${{ github.event.inputs.update_snapshots}}
          MSSQL_HOST: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: S3cretP@ssw0rd
          MSSQL_TPCH_DB: tpch_sf1
          SPICEAI_BENCHMARK_METRICS_KEY: ${{ secrets.SPICEAI_BENCHMARK_METRICS_KEY }}
          SPICED_COMMIT: ${{ steps.setup-spiced.outputs.SPICED_COMMIT }}

      - name: Run the benchmark test (with overrides) - ${{ steps.extract_spicepod_filename.outputs.SPICEPOD_FILENAME }}
        if: ${{ github.event.inputs.query_overrides != '' }}
        run: |
          rm -rf .spice/data
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" testoperator run bench \
            -s /usr/local/bin/spiced \
            -p ${{ github.event.inputs.spicepod_path }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --query-overrides ${{ github.event.inputs.query_overrides }} \
            --ready-wait ${{ github.event.inputs.ready_wait }} \
            --disable-progress-bars \
            --validate=${{ github.event.inputs.validate_results }} \
            --metrics \
            --scale-factor ${{ github.event.inputs.scale_factor }}
        env:
          S3_ENDPOINT: ${{ secrets.MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_ODBC_PATH: ${{ secrets.DATABRICKS_ODBC_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ATHENA_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_ATHENA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_RW_HOST: ${{ secrets.POSTGRES_RW_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TPCH_BENCHMARK_KEY }}
          SPICEAI_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}
          INSTA_UPDATE: ${{ github.event.inputs.update_snapshots}}
          MSSQL_HOST: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: S3cretP@ssw0rd
          MSSQL_TPCH_DB: tpch_sf1
          SPICEAI_BENCHMARK_METRICS_KEY: ${{ secrets.SPICEAI_BENCHMARK_METRICS_KEY }}
          SPICED_COMMIT: ${{ steps.setup-spiced.outputs.SPICED_COMMIT }}

      - name: Install GH CLI
        if: github.event.inputs.update_snapshots == 'always'
        run: |
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
          && sudo mkdir -p -m 755 /etc/apt/keyrings \
          && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
          && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Upload benchmark snapshots to branch
        if: github.event.inputs.update_snapshots == 'always'
        run: |
          # if the spiced commit is set, use that as the branch ID
          if [ -n "${{ github.event.inputs.spiced_commit || '' }}" ]; then
            BRANCH_ID=${{ github.event.inputs.spiced_commit }}
          else
            BRANCH_ID=${{ github.run_id }}
          fi

          BRANCH_NAME="testoperator-snapshot-update/${BRANCH_ID}"

          git config --global user.name 'Spice Benchmark Snapshot Update Bot'
          git config --global user.email 'spiceaibot@spice.ai'
          git checkout -b ${BRANCH_NAME}
          git add '*.snap'
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: Update the ${{ github.event.inputs.query_set }} benchmark snapshots for: ${{ github.event.inputs.spicepod_path }}"
            if git ls-remote --exit-code --heads origin ${BRANCH_NAME}; then
              git pull --rebase origin ${BRANCH_NAME}
            fi
            git push origin ${BRANCH_NAME}

            PR_URL="$(gh pr list --head "${BRANCH_NAME}" --state open --json url --jq .[].url)"
            if [[ -n "${PR_URL}" ]]; then
              echo "PR already exists -> ${PR_URL}"
              exit 0
            else
              gh pr create --title "fix: Update benchmark snapshots" --body "Updates some benchmark snapshots" --base trunk --head ${BRANCH_NAME} --label kind/bug
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
