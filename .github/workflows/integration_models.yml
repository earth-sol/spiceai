---
name: integration tests (models)

on:
  pull_request:
    branches:
      - trunk
      - release-*
      - feature-*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'README.md'
      - 'Makefile'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.github/**'
      - 'version.txt'
      - '.schema/**'
      - '.vscode/**'
      - 'deploy/**'
      - 'install/**'
      - 'media/**'
      - 'monitoring/**'
      - 'acknowledgements.md'
      - 'Dockerfile*'
      - 'bin/spice/**'

  workflow_dispatch:

concurrency:
  # Allow only one workflow per any non-trunk branch.
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'trunk' && github.sha || 'any-sha' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Test Binary
    runs-on: 'spiceai-macos'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          os: 'darwin'

      # Build the test binary without running tests
      - name: Build AI integration test binary
        run: |
          TEST_BINARY_PATH=$(cargo test -p runtime --test integration_models --features models,metal --no-run --message-format=json | jq -r 'select(.reason == "compiler-artifact" and (.target.kind | contains(["test"])) and .executable != null) | .executable')
          cp $TEST_BINARY_PATH ./ai_integration_test

      # Upload the test binary as an artifact
      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-integration-test-binary
          path: ./ai_integration_test
          retention-days: 1

  test-openai:
    name: Test OpenAI Models
    needs: build
    permissions: read-all
    runs-on: 'spiceai-macos'
    steps:
      - uses: actions/checkout@v4

      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: ai-integration-test-binary
          path: ./integration_test

      - name: Mark test binary as executable
        run: |
          ls -l ./integration_test
          chmod +x ./integration_test/ai_integration_test

      - name: Set up Open.ai API Key
        run: |
          echo 'SPICE_OPENAI_API_KEY="${{ secrets.SPICE_SECRET_OPENAI_API_KEY }}"' > .env

      - name: Run integration test
        env:
          SPICE_SECRET_OPENAI_API_KEY: ${{ secrets.SPICE_SECRET_OPENAI_API_KEY }}
        run: |
          if [ -z "$SPICE_SECRET_OPENAI_API_KEY" ] ; then
            echo "Error: OpenAI API key is not defined."
            exit 1
          fi
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" ./integration_test/ai_integration_test --nocapture openai_test

      - name: Run Beta functionality embeddings test
        env:
          SPICE_SECRET_OPENAI_API_KEY: ${{ secrets.SPICE_SECRET_OPENAI_API_KEY }}
        run: |
          if [ -z "$SPICE_SECRET_OPENAI_API_KEY" ] ; then
            echo "Error: OpenAI API key is not defined."
            exit 1
          fi
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" ./integration_test/ai_integration_test --nocapture openai_embeddings_beta_requirements

  test-hf:
    name: Test Huggingface Models
    needs: build
    permissions: read-all
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: ai-integration-test-binary
          path: ./integration_test

      - name: Mark test binary as executable
        run: |
          ls -l ./integration_test
          chmod +x ./integration_test/ai_integration_test

      - name: Run integration test with profiling
        env:
          SPICE_AI_HF_TOKEN: ${{ secrets.SPICE_SECRET_HF_TOKEN }}
        id: run_test
        continue-on-error: true
        run: |
          if [ -z "$SPICE_AI_HF_TOKEN" ] ; then
            echo "Error: Hugging Face API Token is not defined."
            exit 1
          fi

          # Create monitoring script that can attach to other processes
          cat > monitor.sh << 'EOF'
          #!/bin/bash
          PID=$1

          echo "Resource monitoring started for PID $PID at $(date)"
          echo "-------------------------------------"

          # Print system info
          echo "System Information:"
          sw_vers || uname -a
          echo "Available memory:"
          vm_stat || free -m
          echo "-------------------------------------"

          # Monitor loop
          while ps -p $PID > /dev/null 2>&1; do
            echo "$(date +%T) | Memory: $(ps -o rss= -p $PID 2>/dev/null | awk '{print $1/1024 " MB"}') | CPU: $(ps -o %cpu= -p $PID 2>/dev/null)%"

            # Get process threads
            echo "Thread count: $(ps -M $PID 2>/dev/null | grep -v USER | wc -l | tr -d ' ')"

            # Get open file descriptors
            echo "Open FDs: $(lsof -p $PID 2>/dev/null | wc -l | tr -d ' ')"

            # Show top child processes by memory
            echo "Child processes:"
            ps -o pid,%cpu,%mem,command -p $(pgrep -P $PID) 2>/dev/null | head -n 5

            # Check Metal info
            if command -v system_profiler &>/dev/null; then
              METAL_INFO=$(system_profiler SPDisplaysDataType 2>/dev/null | grep -A 3 "Metal:")
              if [ ! -z "$METAL_INFO" ]; then
                echo "Metal Info: $METAL_INFO"
              fi
            fi

            echo "-------------------------------------"
            sleep 5
          done

          echo "Process $PID no longer exists as of $(date)"
          EOF

          chmod +x monitor.sh

          # Launch the test and capture its PID
          echo "Starting integration test..."
          RUST_LOG=debug INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" ./integration_test/ai_integration_test --test-threads=1 --nocapture huggingface_test > test_output.log 2>&1 &
          TEST_PID=$!

          echo "Test process started with PID: $TEST_PID"

          # Start monitoring the test process
          ./monitor.sh $TEST_PID > monitoring.log &
          MONITOR_PID=$!

          # Wait for test to complete
          wait $TEST_PID
          TEST_EXIT_CODE=$?

          # Stop monitoring
          kill $MONITOR_PID || true

          # Print test output
          echo "Test output:"
          cat test_output.log

          # Print monitoring results
          echo "Resource monitoring results:"
          cat monitoring.log

          # Upload both logs
          echo "monitoring-log=$(pwd)/monitoring.log" >> $GITHUB_OUTPUT
          echo "test-output-log=$(pwd)/test_output.log" >> $GITHUB_OUTPUT

          echo $TEST_EXIT_CODE > test_exit_code.txt

      - name: Upload monitoring logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: huggingface-test-monitoring
          path: |
            monitoring.log
            test_output.log

      - name: Check test result
        if: always()  # Always run this step
        run: |
          if [ -f test_exit_code.txt ]; then
            EXIT_CODE=$(cat test_exit_code.txt)
            if [ "$EXIT_CODE" != "0" ]; then
              echo "Test failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            else
              echo "Test passed"
            fi
          else
            echo "Test exit code file not found"
            exit 1
          fi

      - name: Run Beta functionality embedding tests
        env:
          SPICE_HF_TOKEN: ${{ secrets.SPICE_SECRET_HF_TOKEN }}
        run: |
          if [ -z "$SPICE_HF_TOKEN" ] ; then
            echo "Error: Hugging Face API Token is not defined."
            exit 1
          fi
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" ./integration_test/ai_integration_test --nocapture hf_embeddings_beta_requirements

  test-local:
    name: Test Local Models
    needs: build
    permissions: read-all
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: ai-integration-test-binary
          path: ./integration_test

      - name: Mark test binary as executable
        run: |
          ls -l ./integration_test
          chmod +x ./integration_test/ai_integration_test

      - name: Run Beta functionality embedding tests
        run: |
          INSTA_WORKSPACE_ROOT="${PWD}" CARGO_MANIFEST_DIR="${PWD}" ./integration_test/ai_integration_test --nocapture local_embeddings_beta_requirements
