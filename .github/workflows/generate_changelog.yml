name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      previous_release_tag:
        description: 'The previous release tag to compare against (e.g. v1.8.0)'
        type: string
        required: true
        default: 'v1.8.0'
      release_branch:
        description: 'The release branch (or prep branch) to compare against (e.g. release/1.8 or pease/release-1.8-prep)'
        type: string
        required: true
        default: 'release/1.8'

jobs:
  generate:
    name: Generate Changelog
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history (including tags) to get the correct cherry-pick commits

      - name: Generate Changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOUS_RELEASE_TAG: ${{ inputs.previous_release_tag }}
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          python3 ./scripts/generate_changelog.py $PREVIOUS_RELEASE_TAG $RELEASE_BRANCH
