---
name: ai benchmark (nsql)

on:
  workflow_dispatch:
    inputs:
      model_option:
        description: 'Which model do you want to test? (Default is ALL)'
        required: false
        type: choice
        options:
          - 'all'
          - 'gpt-5.2'
          - 'o3-mini'
          - 'llama3-3B-Instruct'
          - 'claude-3-5-haiku'
          - 'grok-4-fast'
        default: 'all'
  schedule:
    - cron: '0 5 * * 2,5' # Every Monday and Thursday at 10pm PST (5am UTC next day)

concurrency:
  # Allow only one workflow per any non-trunk branch.
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'trunk' && github.sha || 'any-sha' }}
  cancel-in-progress: true

jobs:
  build-testoperator:
    name: Build testoperator
    runs-on: 'spiceai-macos'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Build Testoperator
        uses: ./.github/actions/build-testoperator
        with:
          install_to_system_path: 'false'
          upload_artifact: 'true'
          force_rebuild: 'true'
          download_from_minio: 'false'

  build-spiced:
    name: Build spiced
    runs-on: 'spiceai-macos'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build spiced
        uses: ./.github/actions/build-spiced
        with:
          features: 'models'
          upload_artifact: 'true'

  setup-matrix:
    name: Setup matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.result }}

    steps:
      - name: Set up matrix
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        id: setup-matrix
        with:
          script: |
            const matrix = [
              { name: "gpt-5.2" },
              { name: "o3-mini" },
              { name: "llama3-3B-Instruct" },
              { name: "claude-3-5-haiku" },
              { name: "grok-4-fast" },
            ];

            const model_option = context.payload.inputs?.model_option || 'all';
            let filtered = matrix;

            if (model_option !== 'all') {
              filtered = filtered.filter(m => m.name === model_option);
            }

            return filtered;

  run-testoperator:
    name: tpch_nsql benchmark
    needs:
      - build-testoperator
      - build-spiced
      - setup-matrix
    runs-on: 'spiceai-macos'
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Download testoperator
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: testoperator-darwin

      - name: Download spiced
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v6
        with:
          name: spiced

      - name: Mark binaries executable
        run: |
          chmod +x ./testoperator
          chmod +x ./spiced

      - name: Run tpch_nsql evals
        env:
          SPICE_OPENAI_API_KEY: ${{ secrets.SPICE_SECRET_OPENAI_API_KEY }}
          SPICE_HF_TOKEN: ${{ secrets.SPICE_SECRET_HF_TOKEN }}
          SPICE_ANTHROPIC_API_KEY: ${{ secrets.SPICE_SECRET_ANTHROPIC_API_KEY }}
          SPICE_XAI_API_KEY: ${{ secrets.SPICE_SECRET_XAI_API_KEY }}
          SPICEAI_BENCHMARK_METRICS_KEY: ${{ secrets.SPICEAI_BENCHMARK_METRICS_KEY }}
        run: |
          ./testoperator run evals \
            -s $GITHUB_WORKSPACE/spiced \
            -p test/spicepods/models/nsql_bench.yaml \
            -d $GITHUB_WORKSPACE/test/nsql_bench/data \
            --ready-wait 180 \
            --metrics
