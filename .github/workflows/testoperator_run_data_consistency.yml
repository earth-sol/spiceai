name: data consistency tests

on:
  workflow_dispatch:
    inputs:
      spiced_commit:
        description: 'spiced build commit'
        required: false
        type: string
      spicepod_path:
        description: 'The spicepod file to test with'
        required: true
        type: string
      compare_spicepod_path:
        description: 'The spicepod file to compare against'
        required: true
        type: string
      query_set:
        description: 'Query set'
        required: true
        default: 'tpch'
        type: choice
        options:
          - 'tpch'
          - 'tpcds'
          - 'clickbench'
      query_overrides:
        description: 'Query overrides'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - 'sqlite'
          - 'postgresql'
          - 'mysql'
          - 'dremio'
          - 'odbc-athena'
          - 'odbc-databricks'
          - 'duckdb'
          - 'duckdb-zero-results'
          - 'snowflake'
          - 'spark'
          - 'iceberg-sf1'
          - 'spicecloud-catalog'
          - 'spicecloud'
      ready_wait:
        description: 'How long (in seconds) to wait for spiced to start'
        required: true
        default: '30'
        type: string
      runner_type:
        description: 'Runner type'
        required: true
        default: 'spiceai-dev-runners'
        type: choice
        options:
          - 'spiceai-dev-runners'
          - 'spiceai-dev-large-runners'

jobs:
  run-data-consistency:
    name: Run data consistency tests
    runs-on: ${{ github.event.inputs.runner_type }}
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v5

      - name: Validate spicepod files exist
        run: |
          if [ ! -f "${{ github.event.inputs.spicepod_path }}" ]; then
            echo "Error: Spicepod file not found at ${{ github.event.inputs.spicepod_path }}"
            exit 1
          fi
          echo "Spicepod file found at ${{ github.event.inputs.spicepod_path }}"

          if [ ! -f "${{ github.event.inputs.compare_spicepod_path }}" ]; then
            echo "Error: Compare spicepod file not found at ${{ github.event.inputs.compare_spicepod_path }}"
            exit 1
          fi
          echo "Compare spicepod file found at ${{ github.event.inputs.compare_spicepod_path }}"

      - name: Install MinIO
        uses: ./.github/actions/setup-minio
        with:
          minio_endpoint: ${{ secrets.MINIO_ENDPOINT }}
          minio_access_key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Setup spiced
        uses: ./.github/actions/setup-spiced
        with:
          spiced_commit: ${{ github.event.inputs.spiced_commit }}

      - name: Build Testoperator
        uses: ./.github/actions/build-testoperator

      - name: Setup Testoperator
        uses: ./.github/actions/setup-testoperator-data
        with:
          query_set: ${{ github.event.inputs.query_set }}

      - name: Run the data consistency test
        if: ${{ github.event.inputs.query_overrides == '' }}
        run: |
          rm -rf .spice/data
          testoperator run data-consistency \
            -s /usr/local/bin/spiced \
            -p ${{ github.event.inputs.spicepod_path }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --ready-wait ${{ github.event.inputs.ready_wait }} \
            --disable-progress-bars \
            --compare-spicepod-path ${{ github.event.inputs.compare_spicepod_path }}
        env:
          S3_ENDPOINT: ${{ secrets.TEST_MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.TEST_MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.TEST_MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.TEST_MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TEST_ENDPOINT: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_ENDPOINT }}
          SPICEAI_TEST_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCH_BENCHMARK_KEY }}
          SPICEAI_TEST_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          SQL_WAREHOUSE_DATABRICKS_TOKEN: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_TOKEN }}
          SQL_WAREHOUSE_DATABRICKS_HOST: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_HOST }}
          SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}

      - name: Run the data consistency test (with overrides)
        if: ${{ github.event.inputs.query_overrides != '' }}
        run: |
          rm -rf .spice/data
          testoperator run data-consistency \
            -s /usr/local/bin/spiced \
            -p ${{ github.event.inputs.spicepod_path }} \
            -d /opt/spiced/data \
            --query-set ${{ github.event.inputs.query_set }} \
            --query-overrides ${{ github.event.inputs.query_overrides }} \
            --ready-wait ${{ github.event.inputs.ready_wait }} \
            --disable-progress-bars \
            --compare-spicepod-path ${{ github.event.inputs.compare_spicepod_path }}
        env:
          S3_ENDPOINT: ${{ secrets.TEST_MINIO_ENDPOINT}}
          S3_KEY: ${{ secrets.TEST_MINIO_ACCESS_KEY}}
          S3_SECRET: ${{ secrets.TEST_MINIO_SECRET_KEY}}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_ENDPOINT: ${{ secrets.DATABRICKS_ENDPOINT }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
          AWS_DATABRICKS_DELTA_ACCESS_KEY_ID: ${{ secrets.AWS_DATABRICKS_DELTA_ACCESS_KEY_ID }}
          AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY: ${{ secrets.AWS_DATABRICKS_DELTA_SECRET_ACCESS_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          MYSQL_HOST: ${{ secrets.TEST_MYSQL_HOST }}
          MYSQL_TCP_PORT: 3306
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPICEAI_TEST_ENDPOINT: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_ENDPOINT }}
          SPICEAI_TEST_TPCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCH_BENCHMARK_KEY }}
          SPICEAI_TEST_TPCDS_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_TEST_TPCDS_BENCHMARK_KEY }}
          SPICEAI_CLICKBENCH_API_KEY: ${{ secrets.SPICE_SECRET_SPICEAI_CLICKBENCH_BENCHMARK_KEY }}
          SQL_WAREHOUSE_DATABRICKS_TOKEN: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_TOKEN }}
          SQL_WAREHOUSE_DATABRICKS_HOST: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_HOST }}
          SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.SQL_WAREHOUSE_DATABRICKS_SQL_WAREHOUSE_ID }}
          DREMIO_ENDPOINT: ${{ secrets.SPICE_DREMIO_ENDPOINT}}
          DREMIO_USERNAME: ${{ secrets.SPICE_DREMIO_USERNAME}}
          DREMIO_PASSWORD: ${{ secrets.SPICE_DREMIO_PASSWORD}}
