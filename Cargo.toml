[workspace]
default-members = ["bin/spiced"]
members = [
    "bin/spiced/",
    "crates/app",
    "crates/arrow_sql_gen",
    "crates/arrow_tools",
    "crates/data_components",
    "crates/document_parse",
    "crates/event_stream",
    "crates/flight_client",
    "crates/flightrepl",
    "crates/llms",
    "crates/model_components",
    "crates/ns_lookup",
    "crates/otel-arrow",
    "crates/package",
    "crates/runtime",
    "crates/runtime-auth",
    "crates/spice_cloud",
    "crates/spicepod",
    "crates/telemetry",
    "crates/test-framework",
    "crates/token_providers",
    "crates/tools",
    "crates/util",
    "crates/workers",
    "tools/evalconverter",
    "tools/flightpublisher/",
    "tools/flightsubscriber/",
    "tools/otelpublisher/",
    "tools/spicepodschema/",
    "tools/spiceschema",
    "tools/testoperator",
]

# Explicitly set the resolver to version 2, which is the default for packages with edition >= 2021
# https://doc.rust-lang.org/edition-guide/rust-2021/default-cargo-resolver.html
resolver = "2"

[workspace.package]
edition = "2024"
exclude = [".github/"]
homepage = "https://spice.ai"
license = "Apache-2.0"
repository = "https://github.com/spiceai/spiceai"
rust-version = "1.85"
version = "1.2.2"

[workspace.dependencies]
arrow = { version = "=54.2.1", features = ["prettyprint"] }
arrow-array = "=54.2.1"
arrow-buffer = "54"
arrow-cast = "54"
arrow-csv = "54"
arrow-flight = "54"
arrow-ipc = "54"
arrow-json = "54"
arrow-odbc = "16"
arrow-schema = "54"
async-openai = { git = "https://github.com/spiceai/async-openai", rev = "21373192d0c3fa94c4438b8e677a9cc2350c7fca", features = [
    "byot",
] }
async-stream = "0.3.5"
async-trait = "0.1.86"
axum = { version = "0.7", features = ["macros"] }
base64 = "0.22.1"
bb8 = "0.8"
bb8-postgres = "0.8"
byte-unit = "5.1.4"
bytes = "1.10.0"
charset = "0.1.5"
chrono = "0.4.38"
clap = { version = "4.5.36", features = ["derive", "env"] }
clickhouse-rs = { git = "https://github.com/spiceai/clickhouse-rs.git", tag = "0.2.1", features = [
    "tokio_io",
    "tls",
] }
datafusion = "45"
datafusion-common = "45"
datafusion-execution = "45"
datafusion-expr = "45"
datafusion-federation = "0.1"
datafusion-federation-sql = { git = "https://github.com/spiceai/datafusion-federation.git", rev = "1c814422cfbdeb7f7bd2399e3369656710413aa8" } # spiceai-45
datafusion-functions-json = "0.45"
datafusion-table-providers = "0.1"
dotenvy = "0.15"
duckdb = "1.1.3"
fundu = "2.0.1"
futures = "0.3.30"
globset = "0.4.16"
graph-rs-sdk = { git = "https://github.com/spiceai/graph-rs-sdk", rev = "f8703df260146b313461029d41c4a021306832b8" }
graphql-parser = "0.4.0"
hf-hub = { version = "0.3.0", features = ["tokio"] }
http = "1.3.1"
iceberg = "0.4.0"
iceberg-catalog-rest = "0.4.0"
iceberg-datafusion = "0.4.0"
imap = { git = "https://github.com/jonhoo/rust-imap", rev = "6fe22ed11a1ccffe1799a73f48e589366d8d100f" }
indexmap = "2"
insta = { version = "1.42.0", features = ["filters"] }
itertools = "0.14"
mailparse = "0.15.0"
moka = { version = "0.12", features = ["future"] }
mysql_async = { version = "0.35.1", features = ["native-tls-tls", "chrono"] }
object_store = { version = "0.11" }
odbc-api = { version = "12.0.1" }
opentelemetry = { version = "0.27", default-features = false, features = [
    "metrics",
    "trace",
] }
opentelemetry-http = { version = "0.27", features = ["reqwest-rustls"] }
opentelemetry-prometheus = "0.27"
opentelemetry-zipkin = { version = "0.27", default-features = false, features = [
    "reqwest",
    "reqwest-rustls",
] }
opentelemetry_sdk = { version = "0.27", default-features = false, features = [
    "metrics",
    "rt-tokio",
    "trace",
] }
parquet = "54"
paste = "1.0.15"
pem = "3.0.4"
percent-encoding = "2.3.1"
pin-project = "1.1"
postcard = { version = "1.1.1", features = ["use-std"] }
prometheus = "0.13"
r2d2 = "0.8.10"
regex = "1.10.3"
reqwest = { version = "0.12.5", features = ["json", "rustls-tls"] }
rusqlite = { version = "0.31.0", features = ["bundled-decimal", "chrono"] }
rustls = "0.23"
rustls-pemfile = "2.1.3"
secrecy = "0.10.3"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9.30"
snafu = "0.8.5"
snowflake-api = { git = "https://github.com/spiceai/snowflake-rs.git", rev = "ca5c06a6dcb25c7507e110d0a6cd3e0a9ebcbf3b" } # spiceai
ssh2 = { version = "0.9.5" }
suppaftp = { version = "5.3.1", features = ["async"] }
tempfile = "3"
tiberius = { version = "0.12.3", default-features = false, features = [
    "tds73",
    "rustls",
    "chrono",
] }
tokio = { version = "1", features = ["rt-multi-thread", "signal", "macros"] }
tokio-postgres = { version = "0.7.13", features = [
    "with-chrono-0_4",
    "with-uuid-1",
] }
tokio-rusqlite = "0.5.1"
tokio-stream = { version = "0.1.17", features = ["sync"] }
tokio-util = { version = "0.7.11", features = ["compat"] }
tonic = { version = "0.12", features = ["gzip", "tls"] }
tonic-health = { version = "0.12" }
tower = "0.5.2"
tower-http = { version = "0.6.2", features = ["cors"] }
tracing = "0.1.41"
tracing-futures = { version = "0.2.5", features = ["futures-03"] }
tracing-opentelemetry = "0.28"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
uuid = "1"
x509-certificate = "0.23.1"

[patch.crates-io]
arrow = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }        # spiceai-54.2.1
arrow-arith = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }  # spiceai-54.2.1
arrow-array = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }  # spiceai-54.2.1
arrow-cast = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }   # spiceai-54.2.1
arrow-csv = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }    # spiceai-54.2.1
arrow-ipc = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }    # spiceai-54.2.1
arrow-json = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }   # spiceai-54.2.1
arrow-ord = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }    # spiceai-54.2.1
arrow-row = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" }    # spiceai-54.2.1
arrow-select = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" } # spiceai-54.2.1
arrow-string = { git = "https://github.com/spiceai/arrow-rs.git", rev = "3e6fcbcb0e94c411c5e480c77bc830a273f292df" } # spiceai-54.2.1

datafusion = { git = "https://github.com/spiceai/datafusion.git", rev = "a898971e2c2652abf924d9d60e4d9d0a12620cd9" }           # spiceai-45
datafusion-common = { git = "https://github.com/spiceai/datafusion.git", rev = "a898971e2c2652abf924d9d60e4d9d0a12620cd9" }    # spiceai-45
datafusion-execution = { git = "https://github.com/spiceai/datafusion.git", rev = "a898971e2c2652abf924d9d60e4d9d0a12620cd9" } # spiceai-45
datafusion-expr = { git = "https://github.com/spiceai/datafusion.git", rev = "a898971e2c2652abf924d9d60e4d9d0a12620cd9" }      # spiceai-45

datafusion-federation = { git = "https://github.com/spiceai/datafusion-federation.git", rev = "1c814422cfbdeb7f7bd2399e3369656710413aa8" }                      # spiceai-45
datafusion-table-providers = { git = "https://github.com/datafusion-contrib/datafusion-table-providers.git", rev = "c371d52d942a87287e6c35a9abb916d812f803c0" } # spiceai

duckdb = { git = "https://github.com/spiceai/duckdb-rs.git", rev = "2e24b958e44ec7419290249e27a15f1a19703fff" } # spiceai-1.1.3-backported-arrow-54

rusqlite = { git = "https://github.com/spiceai/rusqlite.git", rev = "97054b6af725caf5d3e952e349746706e00d0ea5" }

