[workspace]
default-members = ["bin/spiced"]
members = [
    "bin/spiced/",
    "crates/app",
    "crates/arrow_sql_gen",
    "crates/arrow_tools",
    "crates/data_components",
    "crates/document_parse",
    "crates/event_stream",
    "crates/flight_client",
    "crates/flightrepl",
    "crates/llms",
    "crates/model_components",
    "crates/ns_lookup",
    "crates/otel-arrow",
    "crates/package",
    "crates/runtime",
    "crates/runtime-auth",
    "crates/search",
    "crates/spice_cloud",
    "crates/spicepod",
    "crates/telemetry",
    "crates/test-framework",
    "crates/token_provider",
    "crates/tools",
    "crates/util",
    "crates/workers",
    "crates/scheduler",
    "tools/evalconverter",
    "tools/flightpublisher/",
    "tools/flightsubscriber/",
    "tools/otelpublisher/",
    "tools/spicepodschema/",
    "tools/spiceschema",
    "tools/testoperator",
]

# Explicitly set the resolver to version 2, which is the default for packages with edition >= 2021
# https://doc.rust-lang.org/edition-guide/rust-2021/default-cargo-resolver.html
resolver = "2"

[workspace.package]
edition = "2024"
exclude = [".github/"]
homepage = "https://spice.ai"
license = "Apache-2.0"
repository = "https://github.com/spiceai/spiceai"
rust-version = "1.86"
version = "1.4.0-unstable"

[workspace.dependencies]
ahash = "0.8.12"
arrow = { version = "55.1", features = ["prettyprint"] }
arrow-array = "55.1"
arrow-buffer = "55.1"
arrow-cast = "55.1"
arrow-csv = "55.1"
arrow-flight = "55.1"
arrow-ipc = "55.1"
arrow-json = "55.1"
arrow-odbc = "16"
arrow-schema = "55.1"
async-openai = { git = "https://github.com/spiceai/async-openai", rev = "21373192d0c3fa94c4438b8e677a9cc2350c7fca", features = [
    "byot",
] }
async-stream = "0.3.5"
async-trait = "0.1.86"
axum = { version = "0.8", features = ["macros"] }
base64 = "0.22.1"
bb8 = "0.8"
bb8-postgres = "0.8"
byte-unit = "5.1.4"
bytes = "1.10.0"
charset = "0.1.5"
chrono = "0.4.38"
clap = { version = "4.5.36", features = ["derive", "env"] }
clickhouse-rs = { git = "https://github.com/spiceai/clickhouse-rs.git", tag = "0.2.1", features = [
    "tokio_io",
    "tls",
] }
datafusion = "47"
datafusion-common = "47"
datafusion-datasource = "47"
datafusion-execution = "47"
datafusion-expr = "47"
datafusion-federation = { version = "0.4.2", features = ["sql"] }
datafusion-functions-json = "0.47"
datafusion-table-providers = "0.1"
delta_kernel = { version = "0.11", features = ["default-engine", "arrow-55"] }
dotenvy = "0.15"
duckdb = "1.1.3"
fundu = "2.0.1"
futures = "0.3.30"
globset = "0.4.16"
graph-rs-sdk = { git = "https://github.com/spiceai/graph-rs-sdk", rev = "f8703df260146b313461029d41c4a021306832b8" }
graphql-parser = "0.4.0"
hf-hub = { version = "0.3.0", features = ["tokio"] }
http = "1.3.1"
iceberg = "0.4.0"
iceberg-catalog-glue = "0.4.0"
iceberg-catalog-rest = "0.4.0"
iceberg-datafusion = "0.4.0"
imap = { git = "https://github.com/jonhoo/rust-imap", rev = "6fe22ed11a1ccffe1799a73f48e589366d8d100f" }
indexmap = "2"
insta = { version = "1.42.0", features = ["filters"] }
itertools = "0.14"
logos = "0.15.0"
mailparse = "0.15.0"
moka = { version = "0.12", features = ["future"] }
mysql_async = { version = "0.35.1", features = ["native-tls-tls", "chrono"] }
object_store = { version = "0.12" }
odbc-api = { version = "13" }
opentelemetry = { version = "0.27", default-features = false, features = [
    "metrics",
    "trace",
] }
opentelemetry-http = { version = "0.27", features = ["reqwest-rustls"] }
opentelemetry-prometheus = "0.27"
opentelemetry-zipkin = { version = "0.27", default-features = false, features = [
    "reqwest",
    "reqwest-rustls",
] }
opentelemetry_sdk = { version = "0.27", default-features = false, features = [
    "metrics",
    "rt-tokio",
    "trace",
] }
parquet = "55"
paste = "1.0.15"
pem = "3.0.4"
percent-encoding = "2.3.1"
pin-project = "1.1"
postcard = { version = "1.1.1", features = ["use-std"] }
prometheus = "0.13"
r2d2 = "0.8.10"
regex = "1.10.3"
reqwest = { version = "0.12.5", features = ["json", "rustls-tls"] }
rmcp = { git = "https://github.com/spiceai/modelcontextprotocol-rust-sdk.git", rev = "ec71bd9b735c87cc903c33ed643a04bfd661273e" }
rusqlite = { version = "0.31.0", features = ["bundled-decimal", "chrono"] }
rustls = "0.23"
rustls-pemfile = "2.1.3"
secrecy = "0.10.3"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9.30"
snafu = "0.8.5"
snowflake-api = { git = "https://github.com/spiceai/snowflake-rs.git", rev = "8933be547cb8ed17f2fc221ba7b283376cf2c9ab" } # spiceai
ssh2 = { version = "0.9.5" }
suppaftp = { version = "5.3.1", features = ["async"] }
tempfile = "3"
tiberius = { version = "0.12.3", default-features = false, features = [
    "tds73",
    "rustls",
    "chrono",
] }
tokio = { version = "1", features = ["rt-multi-thread", "signal", "macros"] }
tokio-postgres = { version = "0.7.13", features = [
    "with-chrono-0_4",
    "with-uuid-1",
] }
tokio-rusqlite = "0.5.1"
tokio-stream = { version = "0.1.17", features = ["sync"] }
tokio-util = { version = "0.7.11", features = ["compat"] }
tonic = { version = "0.12", features = ["gzip", "tls"] }
tonic-health = { version = "0.12" }
tower = "0.5.2"
tower-http = { version = "0.6.2", features = ["cors"] }
tracing = "0.1.41"
tracing-futures = { version = "0.2.5", features = ["futures-03"] }
tracing-opentelemetry = "0.28"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
uuid = "1"
x509-certificate = "0.23.1"

[profile.release-lto]
inherits = "release"
lto = true

[profile.lint]
debug = "line-tables-only"
incremental = false
inherits = "dev"
lto = "off"

[patch.crates-io]

datafusion = { git = "https://github.com/spiceai/datafusion.git", rev = "b5c62f29d2c70c5331ff50015b67b5e1cafcd578" }            # spiceai-47
datafusion-common = { git = "https://github.com/spiceai/datafusion.git", rev = "b5c62f29d2c70c5331ff50015b67b5e1cafcd578" }     # spiceai-47
datafusion-datasource = { git = "https://github.com/spiceai/datafusion.git", rev = "b5c62f29d2c70c5331ff50015b67b5e1cafcd578" } # spiceai-47
datafusion-execution = { git = "https://github.com/spiceai/datafusion.git", rev = "b5c62f29d2c70c5331ff50015b67b5e1cafcd578" }  # spiceai-47
datafusion-expr = { git = "https://github.com/spiceai/datafusion.git", rev = "b5c62f29d2c70c5331ff50015b67b5e1cafcd578" }       # spiceai-47

datafusion-federation = { git = "https://github.com/spiceai/datafusion-federation.git", rev = "9db74a4b360df6be1bb554c59a474a2fd4bfb7e9" }                      # spiceai-47
datafusion-table-providers = { git = "https://github.com/datafusion-contrib/datafusion-table-providers.git", rev = "d2cfe4644286df7cad006c090174e475716cb8d8" } # spiceai

duckdb = { git = "https://github.com/spiceai/duckdb-rs.git", rev = "69ae7518ee093a1b070e9e4e6f011ef353431086" } # spiceai-1.1.3-backported-arrow-55

rusqlite = { git = "https://github.com/spiceai/rusqlite.git", rev = "97054b6af725caf5d3e952e349746706e00d0ea5" }

# Tracking Issue: https://github.com/allan2/dotenvy/issues/113
dotenvy = { git = "https://github.com/spiceai/dotenvy.git", rev = "e5cef1871b08003198949dfe2da988633eaad78f" }

iceberg = { git = "https://github.com/spiceai/iceberg-rust.git", rev = "a56b803272db4a7351b2807f412abfbfd3cfd422" }              # spiceai-0.4.0-df-47
iceberg-catalog-rest = { git = "https://github.com/spiceai/iceberg-rust.git", rev = "a56b803272db4a7351b2807f412abfbfd3cfd422" } # spiceai-0.4.0-df-47
iceberg-datafusion = { git = "https://github.com/spiceai/iceberg-rust.git", rev = "a56b803272db4a7351b2807f412abfbfd3cfd422" }   # spiceai-0.4.0-df-47

cudarc = { git = "https://github.com/EricLBuehler/cudarc", rev = "f6e5bf51153d40e34eb1262b98895ac1235b6422" }
