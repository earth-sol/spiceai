[workspace]
default-members = ["bin/spiced"]
members = [
    "bin/spiced/",
    "crates/app",
    "crates/arrow_sql_gen",
    "crates/arrow_tools",
    "crates/aws-sdk-credential-bridge",
    "crates/data_components",
    "crates/dataformat-json",
    "crates/document_parse",
    "crates/event_stream",
    "crates/flight_client",
    "crates/flightrepl",
    "crates/llms",
    "crates/model_components",
    "crates/ns_lookup",
    "crates/otel-arrow",
    "crates/runtime-object-store",
    "crates/package",
    "crates/runtime",
    "crates/runtime-auth",
    "crates/runtime-datafusion-index",
    "crates/runtime-datafusion-udfs",
    "crates/runtime-table-partition",
    "crates/runtime-rate-control",
    "crates/s3_vectors",
    "crates/s3_vectors_metadata_filter",
    "crates/search",
    "crates/spice_cloud",
    "crates/spicepod",
    "crates/telemetry",
    "crates/test-framework",
    "crates/token_provider",
    "crates/tools",
    "crates/util",
    "crates/workers",
    "crates/scheduler",
    "tools/evalconverter",
    "tools/flightpublisher/",
    "tools/flightsubscriber/",
    "tools/otelpublisher/",
    "tools/spicepodschema/",
    "tools/spiceschema",
    "tools/testoperator",
    "tools/parsley",
]

# Explicitly set the resolver to version 2, which is the default for packages with edition >= 2021
# https://doc.rust-lang.org/edition-guide/rust-2021/default-cargo-resolver.html
resolver = "2"

[workspace.package]
edition = "2024"
exclude = [".github/"]
homepage = "https://spice.ai"
license = "Apache-2.0"
repository = "https://github.com/spiceai/spiceai"
rust-version = "1.87"
version = "1.6.0-unstable"

[workspace.dependencies]
ahash = "0.8.12"
arrow = { version = "55.1", features = ["prettyprint"] }
arrow-array = "55.1"
arrow-buffer = "55.1"
arrow-cast = "55.1"
arrow-csv = "55.1"
arrow-flight = "55.1"
arrow-ipc = "55.1"
arrow-json = "55.1"
arrow-odbc = "16"
arrow-schema = "55.1"
async-openai = { git = "https://github.com/spiceai/async-openai", rev = "21373192d0c3fa94c4438b8e677a9cc2350c7fca", features = [
    "byot",
] }


async-stream = "0.3.5"
async-trait = "0.1.86"
aws-config = "1.8.5"
aws-credential-types = "1.2"
aws-runtime = "1.5.10"
aws-sdk-bedrockruntime = "1.55.0"
aws-sdk-cognitoidentity = "1.80.0"
aws-sdk-cognitoidentityprovider = "1.92.0"
aws-sdk-dynamodb = "1.84.0"
aws-sdk-glue = "1.90.0"
aws-sdk-s3 = "1.101.0"
aws-sdk-s3vectors = "1.3"
aws-sdk-secretsmanager = "1.76.0"
aws-sdk-sts = "1.78.0"
aws-smithy-runtime = "1.8.6"
aws-smithy-runtime-api = "1.8.7"
aws-smithy-types = "1.3"
axum = { version = "0.8", features = ["macros"] }
base64 = "0.22.1"
bb8 = "0.9"
bb8-postgres = "0.9"
bigdecimal = "0.4.7"
byte-unit = "5.1.4"
bytes = "1.10.0"
charset = "0.1.5"
chrono = "0.4.38"
clap = { version = "4.5.36", features = ["derive", "env"] }
clickhouse-rs = { git = "https://github.com/spiceai/clickhouse-rs.git", tag = "0.2.1", features = [
    "tokio_io",
    "tls",
] }
datafusion = "47"
datafusion-common = "47"
datafusion-datasource = "47"
datafusion-execution = "47"
datafusion-expr = "47"
datafusion-federation = { version = "0.4.2", features = ["sql"] }
datafusion-functions-json = "0.47"
datafusion-table-providers = "0.1"
delta_kernel = { version = "0.12", features = ["default-engine", "arrow-55"] }
dotenvy = "0.15"
duckdb = "1.3.2"
fundu = "2.0.1"
futures = "0.3.30"
globset = "0.4.16"
governor = "0.10.0"
graph-rs-sdk = { git = "https://github.com/spiceai/graph-rs-sdk", rev = "f8703df260146b313461029d41c4a021306832b8" }
graphql-parser = "0.4.0"
hf-hub = { version = "0.4", features = ["tokio"] }
http = "1.3.1"
iceberg = "0.5.1"
iceberg-catalog-glue = "0.5.1"
iceberg-catalog-rest = "0.5.1"
iceberg-datafusion = "0.5.1"
imap = { git = "https://github.com/jonhoo/rust-imap", rev = "6fe22ed11a1ccffe1799a73f48e589366d8d100f" }
indexmap = "2"
insta = { version = "1.42.0", features = ["filters"] }
itertools = "0.14"
logos = "0.15.0"
mailparse = "0.15.0"
moka = { version = "0.12", features = ["future"] }
mysql_async = { version = "0.35.1", features = ["native-tls-tls", "chrono"] }
object_store = { version = "0.12", features = ["aws", "gcp", "azure"] }
odbc-api = { version = "13" }
opentelemetry = { version = "0.27", default-features = false, features = [
    "metrics",
    "trace",
] }
opentelemetry-http = { version = "0.27", features = ["reqwest-rustls"] }
opentelemetry-prometheus = "0.27"
opentelemetry-zipkin = { version = "0.27", default-features = false, features = [
    "reqwest",
    "reqwest-rustls",
] }
opentelemetry_sdk = { version = "0.27", default-features = false, features = [
    "metrics",
    "rt-tokio",
    "trace",
] }
parquet = "55.2"
paste = "1.0.15"
pem = "3.0.4"
percent-encoding = "2.3.1"
pin-project = "1.1"
postcard = { version = "1.1.2", features = ["use-std"] }
prometheus = "0.13"
r2d2 = "0.8.10"
rand = "0.9.2"
regex = "1.10.3"
reqwest = { version = "0.12.5", features = ["json", "rustls-tls"] }
rmcp = { git = "https://github.com/spiceai/modelcontextprotocol-rust-sdk.git", rev = "ec71bd9b735c87cc903c33ed643a04bfd661273e" }
rusqlite = { version = "0.31.0", features = ["bundled-decimal", "chrono"] }
rustls = "0.23"
rustls-pemfile = "2.1.3"
schemars = "0.9.0"
secrecy = "0.10.3"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9.30"
snafu = "0.8.6"
snowflake-api = { git = "https://github.com/spiceai/snowflake-rs.git", rev = "8933be547cb8ed17f2fc221ba7b283376cf2c9ab" } # spiceai
ssh2 = { version = "0.9.5" }
suppaftp = { version = "5.3.1", features = ["async"] }
tantivy = "0.24.1"
tempfile = "3"
tiberius = { version = "0.12.3", default-features = false, features = [
    "tds73",
    "rustls",
    "chrono",
] }
tokio = { version = "1", features = ["rt-multi-thread", "signal", "macros"] }
tokio-postgres = { version = "0.7.13", features = [
    "with-chrono-0_4",
    "with-uuid-1",
] }
tokio-rusqlite = "0.5.1"
tokio-stream = { version = "0.1.17", features = ["sync"] }
tokio-util = { version = "0.7.11", features = ["compat"] }
tonic = { version = "0.12", features = ["gzip", "tls"] }
tonic-health = { version = "0.12" }
tower = "0.5.2"
tower-http = { version = "0.6.2", features = ["cors"] }
tracing = "0.1.41"
tracing-futures = { version = "0.2.5", features = ["futures-03"] }
tracing-opentelemetry = "0.28"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
url = "2.5"
uuid = "1"
x509-certificate = "0.23.1"
# TODO: Switch to official crate once spice-rs is released
spiceai = { git = "https://github.com/spiceai/spice-rs.git", rev = "b2652f2331f8f1879d944b11afd6575140b6c07e" }

[profile.release-lto]
inherits = "release"
lto = true

[profile.lint]
debug = "line-tables-only"
incremental = false
inherits = "dev"
lto = "off"

